<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kala Kuteer — Portal</title>
<style>
  :root{
    --navy:#16305A; --saffron:#E8A33D; --saffron-deep:#C9772A; --teal:#1F7A72; --teal-deep:#155E58;
    --cream:#FBF6EC; --ink:#2B2018; --muted:#7C6F5F; --line:#E7DCC8; --soft:#F3EAD8;
    --good:#2E8B57; --warn:#C24A3B; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
    radial-gradient(circle at 12% 8%, #fff7e8 0%, transparent 40%),
    radial-gradient(circle at 90% 92%, #eaf5f3 0%, transparent 45%), var(--cream);
    color:var(--ink);min-height:100vh}
  .hide{display:none!important}
  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .logincard{background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 16px 40px rgba(21,48,90,.14);padding:30px 28px;width:100%;max-width:380px;text-align:center}
  .logincard img{height:110px;width:auto;margin:0 auto 8px;display:block}
  .logincard h1{font-size:18px;color:var(--navy);margin-bottom:2px}
  .logincard p.sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:#fffdf8}
  .field input:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  .signin{width:100%;background:var(--teal);color:#fff;border:0;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;margin-top:6px}
  .signin:disabled{opacity:.6;cursor:default}
  .msg{font-size:12.5px;margin-top:12px;min-height:16px}
  .msg.err{color:var(--warn)} .msg.ok{color:var(--good)}
  .loginfoot{font-size:11px;color:var(--muted);margin-top:16px}
  .cfgwarn{background:#fbe7e3;color:var(--warn);border-radius:10px;padding:10px;font-size:12px;margin-bottom:16px;text-align:left}
  .logintabs{display:flex;background:var(--soft);border-radius:30px;padding:4px;gap:4px;margin-bottom:16px}
  .ltab{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px;border-radius:30px;cursor:pointer}
  .ltab.active{background:#fff;color:var(--teal-deep);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  /* ---------- APP SHELL ---------- */
  #app{min-height:100vh}
  .top{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(100deg,var(--teal-deep),var(--teal));color:#fff;padding:10px 18px;
    box-shadow:0 6px 18px rgba(21,94,88,.22)}
  .top .brand{display:flex;align-items:center;gap:10px}
  .top .brand .badge{background:#fff;border-radius:10px;padding:4px 7px;display:flex}
  .top .brand img{height:34px;display:block}
  .top .who{display:flex;align-items:center;gap:12px;font-size:13px}
  .rolechip{background:var(--saffron);color:#3a2c00;font-weight:700;font-size:11px;padding:3px 10px;border-radius:20px}
  .logout{background:rgba(255,255,255,.16);color:#fff;border:0;padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer}
  .layout{display:grid;grid-template-columns:220px 1fr;gap:16px;max-width:1180px;margin:16px auto;padding:0 16px}
  .side{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;height:fit-content}
  .navitem{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer}
  .navitem:hover{background:var(--soft)}
  .navitem.active{background:var(--teal);color:#fff}
  .navitem .ic{width:18px;text-align:center}
  .main{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;min-height:480px}
  .welcome{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .ava{width:52px;height:52px;border-radius:50%;background:var(--saffron);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex:none}
  .welcome h2{font-size:22px} .welcome p{font-size:13px;color:var(--muted);margin-top:2px}
  .ok-pill{display:inline-flex;align-items:center;gap:6px;background:#e2f3e9;color:var(--good);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:18px}
  .tile{border:1px solid var(--line);border-radius:14px;padding:16px;background:linear-gradient(180deg,#fff,#fffdf8)}
  .tile .ic{font-size:22px} .tile h3{font-size:14px;margin:8px 0 4px} .tile p{font-size:12px;color:var(--muted)}
  .tile .soon{font-size:10px;font-weight:700;color:var(--saffron-deep);background:#fcefcf;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:8px}
  .note{font-size:12.5px;color:var(--muted);margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
  /* page header */
  .ph{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .ph h2{font-size:21px} .ph p{font-size:13px;color:var(--muted);margin-top:2px}
  .kbtn{background:var(--saffron);color:#3a2c00;border:0;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
  .kbtn.teal{background:var(--teal);color:#fff} .kbtn.ghost{background:var(--soft);color:var(--ink)}
  .kbtn:disabled{opacity:.55;cursor:default}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:6px}
  .kpi{border:1px solid var(--line);border-radius:14px;padding:16px;background:linear-gradient(180deg,#fff,#fffdf8)}
  .kpi .v{font-size:26px;font-weight:800} .kpi .l{font-size:12px;color:var(--muted)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 6px;border-bottom:1px solid var(--line)}
  td{padding:11px 6px;border-bottom:1px solid #f1ead9}
  tr:last-child td{border-bottom:0}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .b-green{background:#e2f3e9;color:var(--good)} .b-red{background:#fbe7e3;color:var(--warn)}
  .b-amber{background:#fcefcf;color:#9a6b00} .b-teal{background:#e2f1ef;color:var(--teal-deep)}
  .b-grey{background:#eee7d8;color:var(--muted)}
  .rowbtn{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--teal);color:var(--teal);background:#fff;cursor:pointer;display:inline-block;margin:2px 3px 2px 0}
  .rowbtn.edit{background:var(--teal);color:#fff;border-color:var(--teal)}
  .rowbtn.danger{border-color:var(--warn);color:var(--warn)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calhd{font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0}
  .calcell{min-height:80px;border:1px solid var(--line);border-radius:8px;background:#fffdf8;padding:4px 5px;overflow:hidden}
  .calcell.blank{background:transparent;border:0}
  .calcell.today{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
  .caldate{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .calev{font-size:10.5px;background:var(--teal);color:#fff;border-radius:5px;padding:2px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .searchbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .searchbar input{flex:1;min-width:200px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;background:#fffdf8}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
  /* form */
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{border:1px solid var(--line);border-radius:14px;padding:16px}
  .panel h3{font-size:14px;margin-bottom:12px}
  .kf{margin-bottom:11px}
  .kf label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
  .kf input,.kf select,.kf textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fffdf8;font-family:inherit}
  .kf input:focus,.kf select:focus,.kf textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  .kf.minor-only{background:#fff7e8;border-radius:9px;padding:6px 8px}
  .kf.adult-only{background:#e9f4f2;border-radius:9px;padding:6px 8px}
  .check{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--ink);margin-bottom:8px}
  .check input{margin-top:2px}
  .notice{font-size:11.5px;line-height:1.5;background:var(--soft);border-radius:10px;padding:12px;margin:8px 0}
  .formmsg{font-size:13px;margin:10px 0;min-height:16px}
  .formmsg.err{color:var(--warn)} .formmsg.ok{color:var(--good)}
  .dl{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1ead9;font-size:13.5px}
  .dl .k{color:var(--muted)} .dl .hl{background:#fff7e8}
  @media(max-width:760px){.layout{grid-template-columns:1fr}.form2{grid-template-columns:1fr}}
</style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="login">
    <form class="logincard" id="loginform" onsubmit="return false">
      <img src="kala-kuteer-logo.png" alt="Kala Kuteer">
      <h1>Welcome to Kala Kuteer</h1>
      <p class="sub">Sign in to your portal</p>
      <div id="cfgwarn" class="cfgwarn hide">⚠️ Not connected to the database yet.</div>
      <div class="logintabs"><button type="button" id="tabPhone" class="ltab active">Student / Parent</button><button type="button" id="tabEmail" class="ltab">Staff</button></div>
      <div id="phoneForm">
        <div class="field"><label>Mobile number</label><div style="display:flex;gap:6px"><select id="lphone_cc" style="max-width:84px"><option value="+91" selected>+91</option><option value="+1">+1</option><option value="+44">+44</option><option value="+7">+7</option><option value="+56">+56</option><option value="+65">+65</option><option value="+66">+66</option><option value="+971">+971</option></select><input id="lphone" inputmode="numeric" placeholder="mobile number" oninput="this.value=this.value.replace(/\D/g,'')"></div></div>
        <div class="field"><label>PIN</label><input id="lpin" type="password" inputmode="numeric" placeholder="PIN (date of birth, DDMMYYYY)"></div>
        <button class="signin" id="signinPhoneBtn">Sign in</button>
      </div>
      <div id="emailForm" style="display:none">
        <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••"></div>
        <button class="signin" id="signinBtn">Sign in</button>
      </div>
      <div class="msg" id="loginMsg"></div>
      <div class="loginfoot">Students &amp; parents: mobile + PIN. Staff: use the Staff tab.</div>
    </form>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="hide">
    <div class="top">
      <div class="brand"><span class="badge"><img src="kala-kuteer-logo.png" alt="Kala Kuteer"></span></div>
      <div class="who"><span id="whoName"></span><span class="rolechip" id="whoRole"></span><button class="logout" id="logoutBtn">Log out</button></div>
    </div>
    <div class="layout">
      <div class="side" id="sideNav"></div>
      <div class="main" id="mainArea"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG  (Supabase project — already connected)
   ===================================================================== */
const SUPABASE_URL      = "https://qazimpjrscihrfjaycxb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_47E2wJ-O69-mFJY5gLzhwA_QZpBbF7d";
/* ===================================================================== */

const ROLE_LABELS = { super_admin:"Super Admin", admin:"Admin", teacher:"Teacher", student:"Student" };
// nav: [icon, label, key, superOnly?]
const NAV = {
  super_admin:[["▦","Dashboard","dashboard"],["👥","Students","students"],["🎼","Classes","classes"],["✓","Attendance","attendance"],["📋","Guru Samvaad","reviews"],["📨","Enquiries","enquiries"],["📝","Intake Form","intake"],["₹","Fees & Invoices","fees"],["🗓","Calendar","calendar"],["📊","Finance & P&L","finance"],["🪕","Inventory","inventory"],["📣","News Board","news"],["💡","Suggestions","suggestions"],["🎓","Teachers","teachers"],["⚙️","Settings & Roles","settings"]],
  admin:[["▦","Dashboard","dashboard"],["👥","Students","students"],["🎼","Classes","classes"],["✓","Attendance","attendance"],["📋","Guru Samvaad","reviews"],["📨","Enquiries","enquiries"],["📝","Intake Form","intake"],["₹","Fees & Invoices","fees"],["🗓","Calendar","calendar"],["🪕","Inventory","inventory"],["📣","News Board","news"],["💡","Suggestions","suggestions"]],
  teacher:[["🎼","My Classes","myclasses"],["📋","Guru Samvaad","reviews"],["🗓","My Calendar","soon"],["📨","Slot Requests","soon"],["✓","Attendance","soon"],["₹","My Earnings","soon"],["💡","Suggestion Box","feedback"]],
  student:[["🏠","Dashboard","soon"],["🌱","My Journey","soon"],["🗓","My Calendar","soon"],["₹","Fees","soon"],["📣","News","soon"],["📜","Exams","soon"],["💡","Suggestion Box","feedback"]]
};
const LIVE = { dashboard:1, students:1, intake:1, attendance:1, fees:1, teachers:1, settings:1, finance:1, enquiries:1, inventory:1, news:1, suggestions:1, calendar:1, classes:1 }; // built modules

const cfgOk = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length > 20;
let db = cfgOk ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const state = { role:"student", name:"", branches:[], courses:[], refLoaded:false };

const $ = id => document.getElementById(id);
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
function show(v){ $("login").classList.toggle("hide", v!=="login"); $("app").classList.toggle("hide", v!=="app"); }
function msg(t, ok){ const m=$("loginMsg"); m.textContent=t; m.className="msg "+(ok?"ok":"err"); }
function ageFromDOB(d){ if(!d) return null; const b=new Date(d), n=new Date(); let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a; }

async function init(){
  if(!cfgOk){ $("cfgwarn").classList.remove("hide"); show("login"); return; }
  const { data:{ session } } = await db.auth.getSession();
  if(session) loadApp(session); else show("login");
  db.auth.onAuthStateChange((_e,s)=>{ if(s) loadApp(s); else show("login"); });
}
async function signIn(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email||!password){ msg("Please enter your email and password."); return; }
  $("signinBtn").disabled=true; msg("Signing in…", true);
  const { error } = await db.auth.signInWithPassword({ email, password });
  $("signinBtn").disabled=false;
  if(error){ msg(error.message); return; } msg("", true);
}
async function loadApp(session){
  let role="student", name=session.user.email, warn="", pinSet=true;
  const { data, error } = await db.from("profiles").select("role, full_name, pin_set").eq("id", session.user.id);
  if(error) warn = "Couldn't read your profile — "+error.message;
  else if(data && data.length){ role=data[0].role||"student"; name=data[0].full_name||session.user.email; pinSet=data[0].pin_set!==false; }
  state.role=role; state.name=name;
  if((role==="student"||role==="teacher"||role==="admin") && !pinSet){ renderSetPin(name, role); show("app"); return; }
  renderShell(role, name, warn);
  show("app");
}
function renderSetPin(name, role){
  const staff = role!=="student"; state._setRole=role;
  $("whoName").textContent="Hi, "+(name||"").split(" ")[0];
  $("whoRole").textContent= role==="teacher"?"Teacher":(role==="admin"?"Admin":"Student");
  $("sideNav").innerHTML="";
  $("mainArea").innerHTML=`<div style="max-width:380px;margin:6px auto">
    <h2 style="font-size:20px;margin-bottom:6px">${staff?"Set your own password 🔒":"Set your private PIN 🔒"}</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">For your security, please choose your own ${staff?"password":"PIN"} now. You'll use this to sign in from here on${staff?"":" — your date of birth won't work after this"}.${staff?"":" <b>Pick any 6 numbers</b> you'll remember (please avoid your birthday)."}</p>
    <div class="kf"><label>${staff?"New password (min 6 characters)":"New PIN — exactly 6 digits"}</label><input id="np1" type="password" ${staff?"":'inputmode="numeric"'} maxlength="${staff?32:6}" placeholder="${staff?"choose a password":"6-digit number"}"></div>
    <div class="kf"><label>Confirm</label><input id="np2" type="password" ${staff?"":'inputmode="numeric"'} maxlength="${staff?32:6}" placeholder="re-enter it"></div>
    <div class="formmsg" id="pinMsg"></div>
    <button class="kbtn teal" id="setPinBtn" style="width:100%">Save</button>
  </div>`;
  $("setPinBtn").onclick=saveNewPin;
}
async function saveNewPin(){
  const m=$("pinMsg"); const a=$("np1").value, b=$("np2").value; const staff=state._setRole!=="student";
  if(staff){ if((a||"").length<6){ m.className="formmsg err"; m.textContent="Password must be at least 6 characters."; return; } }
  else { if(!/^\d{6}$/.test(a)){ m.className="formmsg err"; m.textContent="Your PIN must be exactly 6 digits (numbers only)."; return; } }
  if(a!==b){ m.className="formmsg err"; m.textContent="The two don't match."; return; }
  m.className="formmsg ok"; m.textContent="Saving…"; $("setPinBtn").disabled=true;
  const { error:pe } = await db.auth.updateUser({ password:a });
  if(pe){ $("setPinBtn").disabled=false; m.className="formmsg err"; m.textContent="Couldn't save — "+pe.message; return; }
  const { data:{ user } } = await db.auth.getUser();
  await db.from("profiles").update({ pin_set:true }).eq("id", user.id);
  const { data:{ session } } = await db.auth.getSession();
  loadApp(session);
}

function renderShell(role, name, warn){
  $("whoName").textContent = "Hi, " + (name||"").split(" ")[0];
  $("whoRole").textContent = ROLE_LABELS[role] || role;
  const items = NAV[role] || NAV.student;
  $("sideNav").innerHTML = items.map((it,i)=>
    `<div class="navitem${i===0?' active':''}" data-key="${it[2]}"><span class="ic">${it[0]}</span> ${it[1]}</div>`).join("");
  $("sideNav").querySelectorAll(".navitem").forEach(n=>{
    n.onclick=()=>{
      $("sideNav").querySelectorAll(".navitem").forEach(x=>x.classList.remove("active"));
      n.classList.add("active");
      navigate(n.dataset.key, name, warn);
    };
  });
  navigate(items[0][2], name, warn);
}

const isAdmin = ()=> state.role==="admin"||state.role==="super_admin";

function navigate(key, name, warn){
  const M = $("mainArea");
  if(key==="dashboard") return renderDashboard(name, warn);
  if(key==="students")  return renderStudents();
  if(key==="attendance") return renderAttendance();
  if(key==="fees")      return renderFees();
  if(key==="finance")   return renderFinance();
  if(key==="teachers")  return renderTeachers();
  if(key==="settings")  return renderSettings();
  if(key==="intake")    return renderIntake();
  if(key==="enquiries") return renderEnquiries();
  if(key==="inventory") return renderInventory();
  if(key==="news")      return renderNews();
  if(key==="suggestions") return renderSuggestions();
  if(key==="feedback")  return renderSubmitFeedback();
  if(key==="myclasses") return renderMyClasses();
  if(key==="reviews")   return renderReviews();
  if(key==="calendar")  return renderCalendar();
  if(key==="classes")   return renderClasses();
  if(key==="classdetail") return; // handled directly
  if(key==="studentdetail") return; // handled directly
  // not-yet-built or non-admin shells
  if(!isAdmin()){
    const items = NAV[state.role]||[];
    const tiles = items.slice(1).map(it=>`<div class="tile"><div class="ic">${it[0]}</div><h3>${it[1]}</h3><div class="soon">Coming next</div></div>`).join("");
    M.innerHTML = `<div class="welcome"><div class="ava">${(name[0]||"K").toUpperCase()}</div><div><h2>Welcome, ${esc((name||"").split(" ")[0])}</h2><p>${ROLE_LABELS[state.role]} · Kala Kuteer portal</p></div></div>
      <span class="ok-pill">✓ Signed in &amp; connected</span><div class="grid">${tiles}</div>
      <p class="note">Your modules are being switched on next.</p>`;
    return;
  }
  M.innerHTML = `<div class="ph"><div><h2>Coming next</h2><p>This module is being built. Students &amp; the Intake form are ready to use now.</p></div></div>
    <div class="empty">🛠️ We'll switch this on in an upcoming update.</div>`;
}

async function loadRef(){
  if(state.refLoaded) return;
  const [b,c] = await Promise.all([
    db.from("branches").select("id,name,monthly_fee").order("name"),
    db.from("courses").select("id,name").eq("is_active",true).order("name")
  ]);
  state.branches = b.data||[]; state.courses = c.data||[]; state.refLoaded = true;
}

/* ---------------- DASHBOARD ---------------- */
async function renderDashboard(name, warn){
  const M=$("mainArea");

    <div class="searchbar">
      <span class="mini">Date</span><input id="attDate" type="date" style="max-width:170px;flex:none">

    </div>

  const today = new Date().toISOString().slice(0,10);

async function loadAttendance(){
  const date=$("attDate").value, branch=$("attBranch").value;
  const today=new Date().toISOString().slice(0,10);
  if(!date){ $("attMsg").className="formmsg err"; $("attMsg").textContent="Please pick a date."; return; }
  if(date>today){ $("attMsg").className="formmsg err"; $("attMsg").textContent="Attendance can only be marked for today or a past date."; $("attList").innerHTML=""; return; }
  $("attMsg").textContent=""; $("attList").innerHTML=`<div class="empty">Loading students…</div>`;
  // show students who were active on this date: currently active, OR went inactive AFTER this date — and joined on/before it
  let q=db.from("students").select("id,full_name,branches(name),courses(name)")
    .lte("join_date",date)
    .or(`status.eq.active,status_effective_date.gt.${date}`)
    .order("full_name");
  if(branch) q=q.eq("branch_id",branch);
  const { data:studs, error } = await q;
  if(error){ $("attList").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  const ids=studs.map(s=>s.id);
  let map={};
  if(ids.length){
    const { data:marks } = await db.from("attendance").select("student_id,status").eq("class_date",date).in("student_id",ids);
    (marks||[]).forEach(m=>map[m.student_id]=m.status);
  }
  state._att=map; state._attStuds=studs; state._attDate=date;
  drawAttendance(studs, map);
}
function drawAttendance(studs, map){
  if(!studs.length){ $("attList").innerHTML=`<div class="empty">No active students here.</div>`; return; }
  const n=studs.length, p=Object.values(map).filter(v=>v==="present").length;
  const btn=(id,v,label,cls)=>`<span class="rowbtn" onclick="markAtt('${id}','${v}')" style="margin-right:4px${map[id]===v?(';'+cls):''}">${label}</span>`;
  $("attList").innerHTML=`<div class="mini" style="margin-bottom:8px">${n} active student${n===1?"":"s"} · marked present: ${p}</div>
    <table><tr><th>Student</th><th>Course · Branch</th><th>Mark</th></tr>${studs.map(s=>`<tr>
      <td><b>${esc(s.full_name)}</b></td>
      <td class="mini">${esc(s.courses?.name||"—")} · ${esc(s.branches?.name||"—")}</td>
      <td>${btn(s.id,"present","Present","background:var(--good);color:#fff;border-color:var(--good)")}${btn(s.id,"absent","Absent","background:var(--warn);color:#fff;border-color:var(--warn)")}${btn(s.id,"excused","Excused","background:var(--saffron);color:#3a2c00;border-color:var(--saffron)")}</td>
    </tr>`).join("")}</table>
    <p class="footnote" style="margin-top:26px;border-top:1px solid var(--line);padding-top:14px">Tap Present / Absent / Excused for each student, then click <b>Save attendance</b>.</p>`;
}
function markAtt(id,status){ state._att[id]=status; drawAttendance(state._attStuds, state._att); }
async function saveAttendance(){
  const m=$("attMsg"); const date=state._attDate;
  const today=new Date().toISOString().slice(0,10);
  if(date>today){ m.className="formmsg err"; m.textContent="Attendance can only be saved for today or a past date."; return; }
  const rows=Object.keys(state._att||{}).filter(sid=>state._att[sid]).map(sid=>({ student_id:sid, class_date:date, status:state._att[sid] }));
  if(!rows.length){ m.className="formmsg err"; m.textContent="Mark at least one student first."; return; }
  m.className="formmsg ok"; m.textContent="Saving…";
  const { error } = await db.from("attendance").upsert(rows,{ onConflict:"student_id,class_date" });
  if(error){ m.className="formmsg err"; m.textContent="Couldn't save — "+error.message; return; }
  m.className="formmsg ok"; m.textContent="✓ Saved attendance for "+date+" ("+rows.length+" students).";
}

/* ---------------- FEES & INVOICES ---------------- */
const PAD=n=>String(n).padStart(2,"0");
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const INR=n=>"₹"+Number(n||0).toLocaleString("en-IN");
function feePeriod(){ const v=($("feeMonth")&&$("feeMonth").value)||new Date().toISOString().slice(0,7); const [y,mm]=v.split("-").map(Number); return { v, year:y, monthIdx:mm-1, label:MONS[mm-1]+" "+y, start:`${y}-${PAD(mm)}-01` }; }
async function renderFees(){
  const M=$("mainArea"); await loadRef();
  const thisMonth=new Date().toISOString().slice(0,7);
  M.innerHTML=`<div class="ph"><div><h2>Fees &amp; Invoices</h2><p>Monthly fee by branch · due date from each student's join date · no GST on tuition</p></div><button class="kbtn" id="genInv">Generate invoices</button></div>
    <div class="searchbar"><span class="mini">Month</span><input id="feeMonth" type="month" value="${thisMonth}" max="${thisMonth}" style="max-width:180px;flex:none"><button class="kbtn ghost" id="feeLoad">Load</button></div>
    <div class="formmsg" id="feeMsg"></div>
    <div class="kpis" id="feeKpis" style="margin-bottom:12px"></div>
    <div id="feeList"><div class="empty">Loading…</div></div>`;
  $("feeMonth").onchange=loadFees; $("feeLoad").onclick=loadFees; $("genInv").onclick=generateInvoices;
  loadFees();
}
async function loadFees(){
  const P=feePeriod();
  $("feeList").innerHTML=`<div class="empty">Loading…</div>`;
  const { data:studs, error } = await db.from("students").select("id,full_name,branches(name,monthly_fee)").or(`status.eq.active,status_effective_date.gt.${P.start}`).order("full_name");
  if(error){ $("feeList").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  const { data:inv } = await db.from("invoices").select("id,student_id,amount,due_date,status,student_response").eq("period_label",P.label);
  const invMap={}; (inv||[]).forEach(i=>invMap[i.student_id]=i);
  const invIds=(inv||[]).map(i=>i.id); let payMap={};
  if(invIds.length){ const { data:pays } = await db.from("payments").select("invoice_id,method").in("invoice_id",invIds); (pays||[]).forEach(p=>payMap[p.invoice_id]=p.method); }
  state._fee={ studs, invMap, payMap, P };
  drawFees();
}
function drawFees(){
  const { studs, invMap, payMap, P } = state._fee;
  const today=new Date().toISOString().slice(0,10);
  let billed=0, collected=0;
  const rows=studs.map(s=>{
    const inv=invMap[s.id];
    if(inv){ billed+=Number(inv.amount); if(inv.status==="paid") collected+=Number(inv.amount); }
    let stHtml, action="";
    if(!inv){ stHtml=`<span class="badge b-grey">No invoice</span>`; }
    else if(inv.status==="paid"){ stHtml=`<span class="badge b-green">Paid${payMap[inv.id]?" · "+payMap[inv.id]:""}</span>`; action=`<span class="rowbtn" onclick="genReceipt('${inv.id}')">🧾 Receipt</span> <span class="rowbtn" onclick="waReceipt('${inv.id}')">WhatsApp</span>`; }
    else { const overdue=inv.due_date<today;
      stHtml = overdue?`<span class="badge b-red">Overdue · was due ${inv.due_date}</span>`:`<span class="badge b-amber">Due ${inv.due_date}</span>`;
      if(inv.student_response==="says_paid") stHtml+=` <span class="badge b-teal">Student says paid — verify</span>`;
      else if(inv.student_response==="will_pay_later") stHtml+=` <span class="badge b-grey">Student: will pay later</span>`;
      action=`<select id="pm_${inv.id}" style="font-size:11px;padding:3px 6px;border:1px solid var(--line);border-radius:8px;background:#fffdf8"><option value="cash">Cash</option><option value="upi">UPI / QR</option><option value="card">Card</option><option value="netbanking">Net banking</option></select> <span class="rowbtn" onclick="recordPayment('${inv.id}',${Number(inv.amount)})">Mark paid</span>`;
    }
    const amt = inv?INR(inv.amount):(s.branches&&s.branches.monthly_fee?INR(s.branches.monthly_fee):"—");
    return `<tr><td><b>${esc(s.full_name)}</b></td><td>${esc(s.branches?.name||"—")}</td><td>${amt}</td><td>${stHtml}</td><td>${action}</td></tr>`;
  }).join("");
  const pending=billed-collected;
  $("feeKpis").innerHTML=`<div class="kpi"><div class="l">Billed (${esc(P.label)})</div><div class="v">${INR(billed)}</div></div>
    <div class="kpi"><div class="l">Collected</div><div class="v" style="color:var(--good)">${INR(collected)}</div></div>
    <div class="kpi"><div class="l">Pending</div><div class="v" style="color:var(--warn)">${INR(pending)}</div></div>`;
  $("feeList").innerHTML = studs.length?`<table><tr><th>Student</th><th>Branch</th><th>Amount</th><th>Status</th><th>Action</th></tr>${rows}</table>
    <p class="footnote" style="margin-top:20px;border-top:1px solid var(--line);padding-top:14px">Click <b>Generate invoices</b> to raise this month's fees for active students who don't have one yet. Overdue rows are flagged red — that's your follow-up list.</p>`:`<div class="empty">No active students.</div>`;
}
async function generateInvoices(){
  const P=feePeriod(); const m=$("feeMsg"); m.className="formmsg ok"; m.textContent="Generating…";
  const { data:studs } = await db.from("students").select("id,join_date,branches(monthly_fee)").or(`status.eq.active,status_effective_date.gt.${P.start}`);
  const { data:inv } = await db.from("invoices").select("student_id").eq("period_label",P.label);
  const have=new Set((inv||[]).map(i=>i.student_id));
  const today=new Date().toISOString().slice(0,10);
  const dim=new Date(P.year, P.monthIdx+1, 0).getDate();
  const rows=(studs||[]).filter(s=>!have.has(s.id) && s.branches && Number(s.branches.monthly_fee)>0).map(s=>{
    const day=s.join_date?new Date(s.join_date).getDate():1;
    const due=`${P.year}-${PAD(P.monthIdx+1)}-${PAD(Math.min(day,dim))}`;
    return { student_id:s.id, period_label:P.label, amount:s.branches.monthly_fee, due_date:due, status: due<today?"overdue":"pending" };
  });
  if(!rows.length){ m.className="formmsg ok"; m.textContent="Everyone already has an invoice for "+P.label+" (or has no branch fee set)."; loadFees(); return; }
  const { error } = await db.from("invoices").insert(rows);
  if(error){ m.className="formmsg err"; m.textContent="Couldn't generate — "+error.message; return; }
  m.className="formmsg ok"; m.textContent="✓ Created "+rows.length+" invoice(s) for "+P.label+".";
  loadFees();
}
async function recordPayment(invId, amount){
  const m=$("feeMsg"); const sel=$("pm_"+invId); const method=sel?sel.value:"cash";
  m.className="formmsg ok"; m.textContent="Recording…";
  const { error:pe } = await db.from("payments").insert({ invoice_id:invId, amount, method });
  if(pe){ m.className="formmsg err"; m.textContent="Couldn't record — "+pe.message; return; }
  const { error:ie } = await db.from("invoices").update({ status:"paid" }).eq("id",invId);
  if(ie){ m.className="formmsg err"; m.textContent="Payment saved but status didn't update — "+ie.message; return; }
  m.className="formmsg ok"; m.textContent="✓ Payment recorded ("+method+").";
  loadFees();
}

/* ---------------- FINANCE & P&L ---------------- */
function finPeriod(){ const v=($("finMonth")&&$("finMonth").value)||new Date().toISOString().slice(0,7); const [y,m]=v.split("-").map(Number); const start=`${y}-${PAD(m)}-01`; const end=new Date(y,m,0).toISOString().slice(0,10); const next=`${m===12?y+1:y}-${PAD(m===12?1:m+1)}-01`; return { v, label:MONS[m-1]+" "+y, start, end, next }; }
const FREQ_LABEL={ weekly:"↻ Weekly", monthly:"↻ Monthly", yearly:"↻ Yearly" };
function parseD(s){ const [y,m,d]=String(s).split("-").map(Number); return new Date(y,m-1,d); }
// amount an expense contributes to the month described by P (cash basis: yearly counts fully in its anniversary month)
function expenseMonthAmount(e,P){
  const f=e.frequency||"one_time"; const amt=Number(e.amount||0); const start=e.spent_on; if(!start) return 0;
  if(f==="one_time") return (start>=P.start && start<=P.end)?amt:0;
  if(start>P.end) return 0;                                   // hasn't started yet
  if(e.recur_until && e.recur_until<P.start) return 0;        // already ended
  if(f==="monthly") return amt;
  if(f==="yearly")  return start.slice(5,7)===P.start.slice(5,7)?amt:0;
  if(f==="weekly"){
    const wd=parseD(start).getDay();
    let from=parseD(start)>parseD(P.start)?parseD(start):parseD(P.start);
    let to=parseD(P.end); if(e.recur_until && parseD(e.recur_until)<to) to=parseD(e.recur_until);
    let n=0; for(let d=new Date(from); d<=to; d.setDate(d.getDate()+1)) if(d.getDay()===wd) n++;
    return amt*n;
  }
  return 0;
}
function onFreqChange(){
  const f=$("x_freq")?$("x_freq").value:"one_time"; const rec=f!=="one_time";
  if($("x_untilWrap")) $("x_untilWrap").style.display=rec?"":"none";
  if($("x_recurHint")) $("x_recurHint").style.display=rec?"":"none";
}
async function renderFinance(){

async function loadFinance(){
  const P=finPeriod();
  $("finBody").innerHTML=`<div class="empty">Loading…</div>`;
  const { data:pays } = await db.from("payments").select("amount,paid_at,invoices(students(branch_id))").gte("paid_at",P.start).lt("paid_at",P.next);
  const { data:exps, error } = await db.from("expenses").select("id,category,subcategory,amount,branch_id,spent_on,note,frequency,recur_until").lte("spent_on",P.end).order("spent_on",{ascending:false});
  if(error){ $("finBody").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  state._fin={ pays:pays||[], exps:exps||[], P }; drawFinance();
}
function drawFinance(){
  const { pays, exps, P } = state._fin;
  const bname=id=>{ const b=state.branches.find(x=>x.id===id); return b?b.name:"—"; };
  let income=0; const incByBranch={};
  pays.forEach(p=>{ const a=Number(p.amount||0); income+=a; const bid=p.invoices?.students?.branch_id||"none"; incByBranch[bid]=(incByBranch[bid]||0)+a; });
  let expense=0; const expByBranch={}, expByCat={};
  const erows=[]; // {e, amt} contributing to this month
  exps.forEach(e=>{ const a=expenseMonthAmount(e,P); if(a<=0) return; erows.push({e,amt:a}); expense+=a; const bid=e.branch_id||"none"; expByBranch[bid]=(expByBranch[bid]||0)+a; const c=e.category||"Other"; expByCat[c]=(expByCat[c]||0)+a; });
  const net=income-expense;
  $("finKpis").innerHTML=`<div class="kpi"><div class="l">Income (${esc(P.label)})</div><div class="v" style="color:var(--good)">${INR(income)}</div></div>
    <div class="kpi"><div class="l">Expenses</div><div class="v" style="color:var(--warn)">${INR(expense)}</div></div>
    <div class="kpi"><div class="l">Net (P/L)</div><div class="v" style="color:${net<0?"var(--warn)":"var(--ink)"}">${INR(net)}</div></div>`;
  const branchRows=state.branches.map(b=>{ const inc=incByBranch[b.id]||0, ex=expByBranch[b.id]||0; return `<tr><td><b>${esc(b.name)}</b></td><td>${INR(inc)}</td><td>${INR(ex)}</td><td>${INR(inc-ex)}</td></tr>`; }).join("");
  const uEx=expByBranch["none"]||0, uIn=incByBranch["none"]||0;
  const catKeys=Object.keys(expByCat).sort();
  const catRows=catKeys.length?catKeys.map(c=>`<tr><td>${esc(c)}</td><td>${INR(expByCat[c])}</td></tr>`).join(""):`<tr><td colspan="2" class="mini">No expenses this month.</td></tr>`;
  const fbadge=e=>{ const f=e.frequency||"one_time"; return f!=="one_time"?` <span class="badge b-teal">${FREQ_LABEL[f]||f}</span>`:""; };
  const expList=erows.length?erows.map(({e,amt})=>`<tr><td>${e.spent_on}</td><td>${esc(e.category)}${e.subcategory?" · "+esc(e.subcategory):""}${fbadge(e)}</td><td>${esc(bname(e.branch_id))}</td><td>${INR(amt)}</td><td class="mini">${esc(e.note||"")}${e.frequency&&e.frequency!=="one_time"?`<br><span class="mini" style="color:var(--muted)">recurs from ${esc(e.spent_on)}${e.recur_until?" until "+esc(e.recur_until):""}</span>`:""}<br><span class="rowbtn edit" onclick="editExpense('${e.id}')">✏️ Edit</span><span class="rowbtn danger" onclick="delExpense('${e.id}')">Delete</span></td></tr>`).join(""):`<tr><td colspan="5" class="empty">No expenses recorded for ${esc(P.label)}.</td></tr>`;
  $("finBody").innerHTML=`<div class="row2">
      <div class="panel"><h3>Profit / Loss per centre</h3>
        <table><tr><th>Branch</th><th>Income</th><th>Expenses</th><th>Net</th></tr>${branchRows}
          ${(uEx||uIn)?`<tr><td class="mini">Not branch-specific</td><td>${INR(uIn)}</td><td>${INR(uEx)}</td><td>${INR(uIn-uEx)}</td></tr>`:""}</table></div>
      <div class="panel"><h3>Expenses by category</h3><table><tr><th>Category</th><th>Amount</th></tr>${catRows}</table></div>
    </div>
    <div class="panel" style="margin-top:14px"><h3>Expense entries — ${esc(P.label)}</h3>
      <table><tr><th>Date</th><th>Category</th><th>Branch</th><th>Amount</th><th>Note</th></tr>${expList}</table></div>`;
}
async function addExpense(){
  const m=$("xMsg"); const cat=$("x_cat").value.trim(), sub=$("x_sub").value.trim(), amt=Number($("x_amt").value), branch=$("x_branch").value, date=$("x_date").value, note=$("x_note").value.trim();
  if(!cat) return failMsg(m,"Enter a category.");

  if(!date) return failMsg(m,"Pick a date.");

  const until=($("x_until")&&$("x_until").value)||null;

function drawEnquiries(){
  const all=state._enq||[];
  const counts={ new:0, following_up:0, trial_booked:0, converted:0, lost:0 };
  all.forEach(e=>{ if(counts[e.stage]!=null) counts[e.stage]++; });

    <div class="kpi"><div class="l">Converted</div><div class="v" style="color:var(--good)">${counts.converted}</div></div>`;
  const q=(($("enqSearch")&&$("enqSearch").value)||"").toLowerCase().trim();

function drawSuggestions(){
  const all=state._sug||[];

    <div class="kpi"><div class="l">Actioned</div><div class="v" style="color:var(--good)">${c.actioned}</div></div>`;
  const q=(($("sugSearch")&&$("sugSearch").value)||"").toLowerCase().trim();
  const f=($("sugFilter")&&$("sugFilter").value)||"";
  let list=all.filter(s=>{
    if(f==="open"){ if(s.status==="actioned") return false; }
    else if(f && s.status!==f) return false;
    if(q && !((s.body||"").toLowerCase().includes(q))) return false;
    return true;
  });
  if(!list.length){ $("sugList").innerHTML=`<div class="empty">No suggestions${f||q?" match this filter":" yet. These arrive once students & teachers can submit from their app."}.</div>`; return; }

        <div style="white-space:nowrap">${stageSel(s)} <span class="rowbtn danger" onclick="delSuggestion('${s.id}')">Delete</span></div>
      </div>
      <p style="margin:10px 0 0;white-space:pre-wrap">${esc(s.body)}</p>
    </div>`).join("");
}

  const { data, error } = await db.from("events").select("id,title,event_type,event_date,end_date,description,poster_url").lte("event_date",end).or(`end_date.gte.${start},and(end_date.is.null,event_date.gte.${start})`).order("event_date");
  if(error){ $("calGrid").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  state._events=data||[]; drawCalendar();

function drawCalendar(){
  const [y,mo]=state._calMonth.split("-").map(Number);
  if($("calLabel")) $("calLabel").textContent=MONS[mo-1]+" "+y;
  const first=new Date(y,mo-1,1).getDay(); const dim=new Date(y,mo,0).getDate();
  const todayS=new Date().toISOString().slice(0,10);
  const mStart=new Date(y,mo-1,1), mEnd=new Date(y,mo,0);
  const byDay={}; (state._events||[]).forEach(e=>{
    const s=parseD(String(e.event_date).slice(0,10));
    const en=e.end_date?parseD(String(e.end_date).slice(0,10)):s;
    let d=new Date(Math.max(s,mStart)); const last=new Date(Math.min(en,mEnd));
    for(; d<=last; d.setDate(d.getDate()+1)){ const day=d.getDate(); (byDay[day]=byDay[day]||[]).push(e); }
  });
  const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="calhd">${d}</div>`).join("");
  let cells="";
  for(let i=0;i<first;i++) cells+=`<div class="calcell blank"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${PAD(mo)}-${PAD(d)}`;
    const evs=(byDay[d]||[]).map(e=>`<div class="calev" onclick="editEvent('${e.id}')" title="${esc(e.title)}">${esc(e.title)}</div>`).join("");
    cells+=`<div class="calcell${ds===todayS?" today":""}"><div class="caldate">${d}</div>${evs}</div>`;

      <td class="mini"><span class="rowbtn edit" onclick="editEvent('${e.id}')">✏️ Edit</span><span class="rowbtn danger" onclick="delEvent('${e.id}')">Delete</span></td>
    </tr>`).join("")}</table></div>`:`<div class="empty">No events in ${MONS[mo-1]} ${y} — add one above.</div>`;

async function saveEvent(){
  const m=$("evMsg"); const title=$("ev_title").value.trim(), date=$("ev_date").value;
  if(!title) return failMsg(m,"Enter an event title.");
  if(!date) return failMsg(m,"Pick a start date.");
  const end=$("ev_end").value||null;

/* ---------------- GURU SAMVAAD (quarterly 1:1 student–guru feedback session) ---------------- */
function addMonths(d,m){ return new Date(d.getFullYear(), d.getMonth()+m, d.getDate()); }
function isoLocal(d){ return `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`; }
function fmtNiceDate(s){ const [y,m,dd]=String(s).slice(0,10).split("-").map(Number); return `${dd} ${MONS[m-1]} ${y}`; }
function fmtDateTime(s){ const d=new Date(s); return `${d.getDate()} ${MONS[d.getMonth()]} ${d.getFullYear()}, ${(d.getHours()%12||12)}:${PAD(d.getMinutes())} ${d.getHours()<12?"AM":"PM"}`; }
// quarterly from join date → which cycle is actionable + its state
function ptmStatus(joinDate, today, srv){
  const j=parseD(joinDate);
  let months=(today.getFullYear()-j.getFullYear())*12+(today.getMonth()-j.getMonth());
  if(today.getDate()<j.getDate()) months--;
  const n=Math.max(0,Math.floor(months/3));
  const pastB=addMonths(j,n*3), nextB=addMonths(j,(n+1)*3);
  const keyPast=isoLocal(pastB), keyNext=isoLocal(nextB);
  const rPast=srv.find(r=>r.quarter_label===keyPast), rNext=srv.find(r=>r.quarter_label===keyNext);
  const daysSincePast=Math.round((today-pastB)/864e5), daysToNext=Math.round((nextB-today)/864e5);
  if(rNext && rNext.status==="scheduled") return { state:"scheduled", cycle:keyNext, review:rNext };
  if(rPast && rPast.status==="scheduled") return { state:"scheduled", cycle:keyPast, review:rPast };
  if(rPast && rPast.status==="completed"){ return (daysToNext<=30)?{ state:"due", cycle:keyNext }:{ state:"upcoming", cycle:keyNext }; }
  if(n>=1){ return (daysSincePast>14)?{ state:"overdue", cycle:keyPast }:{ state:"due", cycle:keyPast }; }
  return (daysToNext<=30)?{ state:"due", cycle:keyNext }:{ state:"upcoming", cycle:keyNext };
}

const PHONE_RULES = { "+91":[10,10], "+1":[10,10], "+44":[10,11], "+7":[10,10], "+56":[8,9], "+65":[8,8], "+66":[9,9], "+971":[9,9] };
const CC_OPTS = [["+91","🇮🇳 India +91"],["+1","🇺🇸 USA/Canada +1"],["+44","🇬🇧 UK +44"],["+7","🇷🇺 Russia +7"],["+56","🇨🇱 Chile +56"],["+65","🇸🇬 Singapore +65"],["+66","🇹🇭 Thailand +66"],["+971","🇦🇪 UAE +971"]];
function phoneOK(code,d){ const r=PHONE_RULES[code]||[7,15]; return d.length>=r[0]&&d.length<=r[1]; }
function phoneHint(code){ const r=PHONE_RULES[code]; return r?(r[0]===r[1]?r[0]+" digits":r[0]+"–"+r[1]+" digits"):"7–15 digits"; }

      <div class="kf"><label>Emergency contact *</label><div style="display:flex;gap:6px">${cc('f_emer')}${numIn('f_emer')}</div></div>
    </div>
    <div class="panel"><h3>2 · Course, joining &amp; consent</h3>
      <div class="kf"><label>Branch *</label><select id="f_branch"><option value="">Select…</option>${branchOpts}</select></div>
      <div class="kf"><label>Course *</label><select id="f_course"><option value="">Select…</option>${courseOpts}</select></div>
      <div class="kf"><label>Class level *</label><select id="f_level"><option value="">Select…</option><option>Beginner</option><option>Some experience</option><option>Advanced</option></select></div>
      <div class="kf"><label>Date of joining (= Session 1) *</label><input id="f_join" type="date"></div>
      <div style="font-size:11.5px;color:var(--teal-deep);margin:-4px 0 8px">↳ Monthly fee is calculated from this date.</div>
      <div class="kf"><label>Goal *</label><select id="f_goal"><option value="">Select…</option><option>Hobby</option><option>Certification</option><option>Stage performance</option><option>Professional</option></select></div>
      <div class="kf"><label>How did you find out about us? *</label>
        <select id="f_heard"><option value="">Select…</option><option value="signboard">Signboard</option><option value="website">Website</option><option value="google">Google</option><option value="justdial">Justdial</option><option value="recommended">Recommended by someone</option><option value="other">Others</option></select></div>
      <div class="kf"><label>Owns the instrument? *</label><select id="f_owns"><option value="">Select…</option><option value="yes">Yes</option><option value="no">No</option></select></div>
      <div class="kf"><label>Health / safety — any conditions we should know? *</label><textarea id="f_health" rows="2" placeholder="e.g. anxiety, panic attacks, cardiac issues, etc. — or write NA"></textarea></div>
      <div class="kf"><label>📸 Media consent — may we use photos/videos? *</label><select id="f_media"><option value="">Select…</option><option value="yes">Yes</option><option value="no">No</option></select></div>
      <div class="notice"><b>IMPORTANT NOTICE</b><br>
        <b>A.</b> Kala Kuteer is not accountable or liable for any injury suffered as a result of any physical/medical condition. It is the student's/guardian's duty to inform the School. Submitting this form is an explicit acknowledgement.<br>
        <b>B.</b> Regular attendance is essential; if classes are missed regularly, fee cycles may not be adjusted and the student may be de-enrolled.<br>
        <b>C.</b> A student absent 3 months without prior communication (for non-viable reasons) must re-register to rejoin.<br>
        <b>D.</b> Tracking your own classes is your responsibility. If you miss a class, it is your responsibility to follow up with your teacher and make up that class within the same month. Classes not made up within the month are forfeited — the monthly fee remains payable in full and unused classes do not roll over to the next month.</div>
      <div class="check"><input type="checkbox" id="f_terms"><label for="f_terms" style="margin:0"><b>I have read &amp; acknowledge the above *</b></label></div>
      <div class="kf"><label>Name of person consenting (parent if minor) *</label><input id="f_signer"></div>
      <div class="formmsg" id="intakeMsg"></div>
      <button type="button" class="kbtn teal" id="saveStu" style="width:100%">Save student</button>
    </div>
  </form>`;
  function applyMinor(){ const mn=$("f_minor").checked;
    M.querySelectorAll(".minor-only").forEach(e=>e.style.display=mn?"":"none");
    $("lbl_phone").textContent = mn?"Parent's mobile number *":"Mobile number *";
    $("lbl_email").textContent = mn?"Parent's email *":"Email *";
  }
  $("f_minor").onchange=()=>{ applyMinor(); saveDraft(); };
  $("f_dob").onchange=()=>{ const a=ageFromDOB($("f_dob").value); if(a!=null){ $("f_minor").checked=a<18; } applyMinor(); saveDraft(); };
  $("f_wasame").onchange=()=>{ $("wawrap").style.display=$("f_wasame").checked?"none":""; saveDraft(); };
  $("intakeForm").addEventListener("input", saveDraft);
  const restored = restoreDraft();
  if(restored) $("draftNote").classList.remove("hide");
  applyMinor();
  $("wawrap").style.display=$("f_wasame").checked?"none":"";
  state._dupeOK=false;
  $("saveStu").onclick=submitIntake;
}

async function submitIntake(){
  const m=$("intakeMsg");
  const minor=$("f_minor").checked;
  const D=id=>((($(id)||{}).value)||"").toString().trim();
  const digits=id=>D(id).replace(/\D/g,"");
  function fail(id,message){ m.className="formmsg err"; m.textContent=message; const el=$(id); if(el){ el.focus(); el.scrollIntoView({block:"center",behavior:"smooth"}); } return false; }
  // ---- required: name, dob, primary mobile (valid by country), branch, course, joining, consent ----
  if(!D("f_name")) return fail("f_name","Please enter the student's full name.");
  if(!D("f_dob"))  return fail("f_dob","Please enter the date of birth.");
  if(minor && !D("f_parent")) return fail("f_parent","Please enter the parent/guardian name.");
  const pcode=$("f_phone_cc").value, pnum=digits("f_phone");
  if(!pnum) return fail("f_phone","Please enter a mobile number.");
  if(!phoneOK(pcode,pnum)) return fail("f_phone","That mobile doesn't look right — "+pcode+" needs "+phoneHint(pcode)+".");
  let waE164 = pcode+pnum;
  if(!$("f_wasame").checked){ const wc=$("f_wa_cc").value, wn=digits("f_wa"); if(!wn) return fail("f_wa","Please enter the WhatsApp number (or tick 'same number')."); if(!phoneOK(wc,wn)) return fail("f_wa","WhatsApp number — "+wc+" needs "+phoneHint(wc)+"."); waE164=wc+wn; }
  if(!D("f_email")) return fail("f_email","Please enter the email.");
  const ec=$("f_emer_cc").value, en=digits("f_emer");
  if(!en) return fail("f_emer","Please enter an emergency contact number.");
  if(!phoneOK(ec,en)) return fail("f_emer","Emergency contact — "+ec+" needs "+phoneHint(ec)+".");
  const emerE164=ec+en;
  if(!D("f_branch")) return fail("f_branch","Please choose a branch.");
  if(!D("f_course")) return fail("f_course","Please choose a course.");
  if(!D("f_level"))  return fail("f_level","Please choose the class level.");
  if(!D("f_join"))   return fail("f_join","Please set the date of joining.");
  if(!D("f_goal"))   return fail("f_goal","Please choose a goal.");
  if(!D("f_heard"))  return fail("f_heard","Please choose how they found out about us.");
  if(!D("f_owns"))   return fail("f_owns","Please choose whether the student owns the instrument.");
  if(!D("f_health")) return fail("f_health","Please fill health/safety (write NA if none).");
  if(!D("f_media"))  return fail("f_media","Please choose the media-consent option.");
  if(!$("f_terms").checked){ m.className="formmsg err"; m.textContent="The IMPORTANT NOTICE must be acknowledged."; $("f_terms").focus(); return; }
  if(!D("f_signer")) return fail("f_signer","Please enter the name of the person consenting.");
  const primaryE164 = pcode+pnum;
  // ---- duplicate check (by primary number) — best effort ----
  if(!state._dupeOK){
    try{
      const { data:dupe } = await db.from("students").select("full_name").or(`phone.eq.${primaryE164},parent_phone.eq.${primaryE164},whatsapp.eq.${primaryE164}`).limit(1);
      if(dupe && dupe.length){ state._dupeOK=true; m.className="formmsg err"; m.textContent="⚠️ "+dupe[0].full_name+" already has this number. Click Save again to add anyway."; return; }
    }catch(e){}
  }
  const rec = {
    full_name:D("f_name"), date_of_birth:D("f_dob"), is_minor:minor,
    parent_name: minor?D("f_parent"):null,
    phone: minor? null : primaryE164,
    whatsapp: waE164,
    email: minor? null : D("f_email"),
    parent_phone: minor? primaryE164 : null,
    parent_email: minor? D("f_email") : null,
    emergency_contact: emerE164,
    branch_id:D("f_branch"), course_id:D("f_course"),
    level: D("f_level"), join_date:D("f_join"),
    goal: D("f_goal"),
    owns_instrument: D("f_owns")==="yes",
    health_notes: D("f_health"), heard_via: D("f_heard"),
    consent_media: D("f_media")==="yes",
    consent_terms:true, consent_signed_by:D("f_signer"), consent_signed_at:new Date().toISOString(),
    status:"active"
  };
  $("saveStu").disabled=true; m.className="formmsg ok"; m.textContent="Saving…";
  const { data:ins, error } = await db.from("students").insert(rec).select("id").single();
  if(error){ $("saveStu").disabled=false; m.className="formmsg err"; m.textContent="Couldn't save — "+error.message; state._dupeOK=false; return; }
  // auto-create the student's login (mobile + DOB PIN)
  let cred=" Opening the students list…";
  try{
    const { data:fn, error:ferr } = await db.functions.invoke("create-student-login", { body:{ student_id:ins.id, phone:primaryE164, dob:D("f_dob"), name:D("f_name") } });
    if(ferr) cred=" (login will be set up shortly)";
    else if(fn && fn.ok) cred=" Login → mobile "+primaryE164+", PIN = date of birth ("+fn.pin+"). Share with them.";
    else if(fn && fn.error) cred=" (login note: "+fn.error+")";
  }catch(e){ cred=" (login pending)"; }
  $("saveStu").disabled=false;
  clearDraft();
  m.className="formmsg ok"; m.textContent="✓ Student saved!"+cred;
  setTimeout(()=>gotoNav("students"), 2600);
}

async function signInPhone(){
  const code=$("lphone_cc").value.replace("+",""), num=($("lphone").value||"").replace(/\D/g,""), pin=$("lpin").value;
  if(!num||!pin){ msg("Please enter your mobile number and PIN."); return; }
  $("signinPhoneBtn").disabled=true; msg("Signing in…", true);
  const email = code+num+"@student.kalakuteer.org";
  const { error } = await db.auth.signInWithPassword({ email, password: pin });
  $("signinPhoneBtn").disabled=false;
  if(error){ msg("Couldn't sign in — please check your mobile number and PIN."); return; }
  msg("", true);
}
$("signinBtn").onclick = signIn;
$("signinPhoneBtn").onclick = signInPhone;
$("tabPhone").onclick=()=>{ $("tabPhone").classList.add("active"); $("tabEmail").classList.remove("active"); $("phoneForm").style.display=""; $("emailForm").style.display="none"; msg("",true); };
$("tabEmail").onclick=()=>{ $("tabEmail").classList.add("active"); $("tabPhone").classList.remove("active"); $("emailForm").style.display=""; $("phoneForm").style.display="none"; msg("",true); };
$("loginform").addEventListener("keydown", e=>{ if(e.key==="Enter"){ if($("phoneForm").style.display!=="none") signInPhone(); else signIn(); } });
$("logoutBtn").onclick = async ()=>{ if(db) await db.auth.signOut(); show("login"); if($("password"))$("password").value=""; if($("lpin"))$("lpin").value=""; };
init();
</script>
