<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kala Kuteer — Portal</title>
<style>
  :root{
    --navy:#16305A; --saffron:#F0A92B; --saffron-deep:#C9772A; --maroon:#7A2233; --maroon-deep:#5A1722; --teal:#7A2233; --teal-deep:#5A1722;
    --cream:#FBF6EC; --ink:#2B2018; --muted:#7C6F5F; --line:#E7DCC8; --soft:#F3EAD8;
    --good:#2E8B57; --warn:#C24A3B; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;
    color:var(--ink);min-height:100vh}
  .hide{display:none!important}
  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .logincard{background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 16px 40px rgba(21,48,90,.14);padding:30px 28px;width:100%;max-width:380px;text-align:center}
  .logincard img{height:110px;width:auto;margin:0 auto 8px;display:block}
  .logincard h1{font-size:18px;color:var(--navy);margin-bottom:2px}
  .logincard p.sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:#fffdf8}
  .field input:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  .signin{width:100%;background:var(--teal);color:#fff;border:0;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;margin-top:6px}
  .signin:disabled{opacity:.6;cursor:default}
  .msg{font-size:12.5px;margin-top:12px;min-height:16px}
  .msg.err{color:var(--warn)} .msg.ok{color:var(--good)}
  .loginfoot{font-size:11px;color:var(--muted);margin-top:16px}
  .cfgwarn{background:#fbe7e3;color:var(--warn);border-radius:10px;padding:10px;font-size:12px;margin-bottom:16px;text-align:left}
  .logintabs{display:flex;background:var(--soft);border-radius:30px;padding:4px;gap:4px;margin-bottom:16px}
  .ltab{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px;border-radius:30px;cursor:pointer}
  .ltab.active{background:#fff;color:var(--teal-deep);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  /* ---------- APP SHELL ---------- */
  #app{min-height:100vh}
  .top{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(100deg,var(--teal-deep),var(--teal));color:#fff;padding:10px 18px;
    box-shadow:0 6px 18px rgba(21,94,88,.22)}
  .top .brand{display:flex;align-items:center;gap:10px}
  .top .brand .badge{background:#fff;border-radius:10px;padding:4px 7px;display:flex}
  .top .brand img{height:34px;display:block}
  .top .who{display:flex;align-items:center;gap:12px;font-size:13px}
  .rolechip{background:var(--saffron);color:#3a2c00;font-weight:700;font-size:11px;padding:3px 10px;border-radius:20px}
  .logout{background:rgba(255,255,255,.16);color:#fff;border:0;padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer}
  .layout{display:grid;grid-template-columns:220px 1fr;gap:16px;max-width:1180px;margin:16px auto;padding:0 16px}
  .side{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;height:fit-content}
  .navitem{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer}
  .navitem:hover{background:var(--soft)}
  .navitem.active{background:var(--teal);color:#fff}
  .navitem .ic{width:18px;text-align:center}
  .main{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;min-height:480px}
  .welcome{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .ava{width:52px;height:52px;border-radius:50%;background:var(--saffron);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex:none}
  .welcome h2{font-size:22px} .welcome p{font-size:13px;color:var(--muted);margin-top:2px}
  .ok-pill{display:inline-flex;align-items:center;gap:6px;background:#e2f3e9;color:var(--good);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:18px}
  .tile{border:1px solid var(--line);border-radius:14px;padding:16px;background:linear-gradient(180deg,#fff,#fffdf8)}
  .tile .ic{font-size:22px} .tile h3{font-size:14px;margin:8px 0 4px} .tile p{font-size:12px;color:var(--muted)}
  .tile .soon{font-size:10px;font-weight:700;color:var(--saffron-deep);background:#fcefcf;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:8px}
  .tile .ready{font-size:10px;font-weight:700;color:#1f7a5a;background:#dff3e8;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:8px}
  .tile.click{cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .tile.click:hover{border-color:var(--teal);box-shadow:0 3px 12px rgba(0,0,0,.06)}
  .note{font-size:12.5px;color:var(--muted);margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
  /* page header */
  .ph{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .ph h2{font-size:21px} .ph p{font-size:13px;color:var(--muted);margin-top:2px}
  .kbtn{background:var(--saffron);color:#3a2c00;border:0;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
  .kbtn.teal{background:var(--teal);color:#fff} .kbtn.ghost{background:var(--soft);color:var(--ink)}
  .kbtn:disabled{opacity:.55;cursor:default}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:18px}
  .kpi{border:1px solid var(--line);border-radius:14px;padding:18px;background:linear-gradient(180deg,#fff,#fffdf8);box-shadow:0 1px 3px rgba(43,32,24,.05)}
  .kpi .v{font-size:26px;font-weight:800} .kpi .l{font-size:12px;color:var(--muted)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 6px;border-bottom:1px solid var(--line)}
  td{padding:11px 6px;border-bottom:1px solid #f1ead9}
  tr:last-child td{border-bottom:0}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .b-green{background:#e2f3e9;color:var(--good)} .b-red{background:#fbe7e3;color:var(--warn)}
  .b-amber{background:#fcefcf;color:#9a6b00} .b-teal{background:#f3e0e3;color:var(--teal-deep)}
  .b-grey{background:#eee7d8;color:var(--muted)}
  .rowbtn{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--teal);color:var(--teal);background:#fff;cursor:pointer;display:inline-block;margin:2px 3px 2px 0}
  .rowbtn.edit{background:var(--teal);color:#fff;border-color:var(--teal)}
  .rowbtn.danger{border-color:var(--warn);color:var(--warn)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calhd{font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0}
  .calcell{min-height:80px;border:1px solid var(--line);border-radius:8px;background:#fffdf8;padding:4px 5px;overflow:hidden}
  .calcell.blank{background:transparent;border:0}
  .calcell.today{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
  .caldate{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .calev{font-size:10.5px;background:var(--teal);color:#fff;border-radius:5px;padding:2px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .searchbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  .searchbar input{flex:1;min-width:200px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;background:#fffdf8}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
  /* form */
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:20px 26px;margin-bottom:8px}
  .panel{border:1.5px solid var(--saffron);border-radius:14px;padding:26px;margin-bottom:28px;background:#fff;box-shadow:0 3px 14px rgba(43,32,24,.08)}
  .tip{position:relative;display:inline-block;vertical-align:middle;font-weight:400}
  .tipbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--saffron);background:#fff7e8;cursor:pointer;font-size:12px;line-height:20px;padding:0;vertical-align:middle}
  .tipbub{display:none;position:absolute;top:30px;left:0;z-index:50;width:300px;max-width:78vw;background:#fff7e8;border:1px solid #f0e2c0;border-radius:11px;padding:11px 13px;font-size:12.5px;color:#7a5e1f;line-height:1.5;box-shadow:0 4px 14px rgba(43,32,24,.12);text-align:left;white-space:normal}
  .tipbub.show{display:block}
  .panel h3{margin-bottom:14px}
  .footnote{background:#fdf3f1;border:1px solid #e7b9b0;border-left:4px solid var(--warn);color:#9e3b2a;border-radius:9px;padding:10px 13px;font-size:12.5px;line-height:1.55;margin:10px 0}
  .footnote b{color:#7d2c1e}
  .panel h3{font-size:14px;margin-bottom:12px}
  .kf{margin-bottom:18px}
  .kf label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
  .kf input,.kf select,.kf textarea{width:100%;padding:10px 12px;border:1px solid #E3C285;border-radius:9px;font-size:13.5px;background:#fffdf8;font-family:inherit}
  .kf input:focus,.kf select:focus,.kf textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  .kf.minor-only{background:#fff7e8;border-radius:9px;padding:6px 8px}
  .kf.adult-only{background:#e9f4f2;border-radius:9px;padding:6px 8px}
  .check{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--ink);margin-bottom:8px}
  .check input{margin-top:2px}
  .notice{font-size:11.5px;line-height:1.5;background:var(--soft);border-radius:10px;padding:12px;margin:8px 0}
  .formmsg{font-size:13px;margin:10px 0;min-height:16px}
  .formmsg.err{color:var(--warn)} .formmsg.ok{color:var(--good)}
  .dl{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1ead9;font-size:13.5px}
  .dl .k{color:var(--muted)} .dl .hl{background:#fff7e8}
  @media(max-width:760px){.layout{grid-template-columns:1fr}.form2{grid-template-columns:1fr}.main table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}}
</style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="login">
    <form class="logincard" id="loginform" onsubmit="return false">
      <img src="kala-kuteer-logo.png" alt="Kala Kuteer">
      <h1>Welcome to Kala Kuteer</h1>
      <p class="sub">Sign in to your portal</p>
      <div id="cfgwarn" class="cfgwarn hide">⚠️ Not connected to the database yet.</div>
      <div class="logintabs"><button type="button" id="tabPhone" class="ltab active">Student / Parent</button><button type="button" id="tabEmail" class="ltab">Staff</button></div>
      <div id="phoneForm">
        <div class="field"><label>Mobile number</label><div style="display:flex;gap:6px"><select id="lphone_cc" style="max-width:84px"><option value="+91" selected>+91</option><option value="+1">+1</option><option value="+44">+44</option><option value="+7">+7</option><option value="+56">+56</option><option value="+65">+65</option><option value="+66">+66</option><option value="+971">+971</option></select><input id="lphone" inputmode="numeric" placeholder="mobile number" oninput="this.value=this.value.replace(/\D/g,'')"></div></div>
        <div class="field"><label>PIN</label><input id="lpin" type="password" inputmode="numeric" placeholder="PIN (date of birth, DDMMYYYY)"></div>
        <button class="signin" id="signinPhoneBtn">Sign in</button>
      </div>
      <div id="emailForm" style="display:none">
        <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••"></div>
        <button class="signin" id="signinBtn">Sign in</button>
      </div>
      <div class="msg" id="loginMsg"></div>
      <div class="loginfoot">Students &amp; parents: mobile + PIN. Staff: use the Staff tab.</div>
    </form>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="hide">
    <div class="top">
      <div class="brand"><span class="badge"><img src="kala-kuteer-logo.png" alt="Kala Kuteer"></span></div>
      <div class="who"><span id="whoName"></span><span class="rolechip" id="whoRole"></span><button class="logout" id="logoutBtn">Log out</button></div>
    </div>
    <div class="layout">
      <div class="side" id="sideNav"></div>
      <div class="main" id="mainArea"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG  (Supabase project — already connected)
   ===================================================================== */
const SUPABASE_URL      = "https://qazimpjrscihrfjaycxb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_47E2wJ-O69-mFJY5gLzhwA_QZpBbF7d";
// School UPI for student fee payments — change the id/name to your real UPI handle.
const SCHOOL_UPI = { id: "kalakuteer@upi", name: "Kala Kuteer" };
/* ===================================================================== */

const ROLE_LABELS = { super_admin:"Super Admin", admin:"Admin", teacher:"Teacher", student:"Student" };
// nav: [icon, label, key, superOnly?]
const NAV = {
  super_admin:[["▦","Dashboard","dashboard"],["🗓","Calendar","calendar"],["📝","Intake Form","intake"],["👥","Students","students"],["✓","Attendance","attendance"],["📚","Classes","classes"],["₹","Fees & Invoices","fees"],["📊","Finance & P&L","finance"],["🤝","Guru Payouts","payouts"],["📣","Announcements","news"],["📨","Enquiries","enquiries"],["📋","Guru Samvaad","reviews"],["🎓","Teachers","teachers"],["🪕","Inventory","inventory"],["💡","Suggestions","suggestions"],["🧾","Activity log","activity"],["⚙️","Settings & Roles","settings"]],
  admin:[["▦","Dashboard","dashboard"],["🗓","Calendar","calendar"],["📝","Intake Form","intake"],["👥","Students","students"],["✓","Attendance","attendance"],["📚","Classes","classes"],["₹","Fees & Invoices","fees"],["📣","Announcements","news"],["📨","Enquiries","enquiries"],["🪕","Inventory","inventory"]],
  teacher:[["▦","Dashboard","dashboard"],["📣","Announcements","notices"],["👥","My Students","mystudents"],["📋","Guru Samvaad","reviews"],["🗓","My Calendar","mycalendar"],["✓","Attendance","myattendance"],["₹","My Earnings","earnings"],["💡","Suggestion Box","feedback"]],
  student:[["🏠","Dashboard","dashboard"],["👤","My Profile","myprofile"],["📣","Announcements","mynews"],["🗓","My Calendar","stucal"],["✓","My Attendance","journey"],["₹","Fees","myfees"],["💡","Suggestion Box","feedback"]]
};
const LIVE = { dashboard:1, students:1, intake:1, attendance:1, fees:1, teachers:1, settings:1, finance:1, enquiries:1, inventory:1, news:1, suggestions:1, calendar:1, payouts:1, activity:1, classes:1 }; // built modules

const cfgOk = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length > 20;
let db = cfgOk ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const state = { role:"student", name:"", branches:[], courses:[], refLoaded:false };

const $ = id => document.getElementById(id);
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const safeUrl = u => /^https?:\/\//i.test(u||"") ? u : "#";          // only allow real web links in href (blocks javascript: etc.)
const todayIST = () => new Date(Date.now()+19800000).toISOString().slice(0,10); // today's date in IST (UTC+5:30)
// Fetch ALL rows in 1000-row pages so client-side sums/percentages never silently truncate at Supabase's default cap.
async function fetchAll(makeQuery){ const SIZE=1000; let from=0, all=[]; for(;;){ const { data, error } = await makeQuery().range(from, from+SIZE-1); if(error||!data||!data.length) break; all=all.concat(data); if(data.length<SIZE) break; from+=SIZE; } return all; }
function show(v){ $("login").classList.toggle("hide", v!=="login"); $("app").classList.toggle("hide", v!=="app"); }
function msg(t, ok){ const m=$("loginMsg"); m.textContent=t; m.className="msg "+(ok?"ok":"err"); }
function ageFromDOB(d){ if(!d) return null; const b=new Date(d), n=new Date(); let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a; }

async function init(){
  if(!cfgOk){ $("cfgwarn").classList.remove("hide"); show("login"); return; }
  const { data:{ session } } = await db.auth.getSession();
  if(session) loadApp(session); else show("login");
  db.auth.onAuthStateChange((_e,s)=>{ if(s) loadApp(s); else show("login"); });
}
async function signIn(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email||!password){ msg("Please enter your email and password."); return; }
  $("signinBtn").disabled=true; msg("Signing in…", true);
  const { error } = await db.auth.signInWithPassword({ email, password });
  $("signinBtn").disabled=false;
  if(error){ msg(error.message); return; } msg("", true);
}
async function loadApp(session){
  let role="student", name=session.user.email, warn="", pinSet=true;
  const { data, error } = await db.from("profiles").select("role, full_name, pin_set").eq("id", session.user.id);
  if(error) warn = "Couldn't read your profile — "+error.message;
  else if(data && data.length){ role=data[0].role||"student"; name=data[0].full_name||session.user.email; pinSet=data[0].pin_set!==false; }
  state.role=role; state.name=name;
  if((role==="student"||role==="teacher"||role==="admin") && !pinSet){ renderSetPin(name, role); show("app"); return; }
  if(role==="student"){
    const { data:st } = await db.from("students").select("id,full_name,date_of_birth,is_minor,phone,parent_phone,whatsapp,email,parent_name,parent_email,emergency_contact,level,join_date,goal,owns_instrument,health_notes,heard_via,intake_completed,branch_id,course_id,primary_teacher_id,branches(name),courses(name)").eq("profile_id", session.user.id).maybeSingle();
    if(st && st.intake_completed!==true){ state._intakeSt=st; show("app"); renderStudentIntake(st); return; }
  }
  renderShell(role, name, warn);
  show("app");
}
function renderSetPin(name, role){
  const staff = role!=="student"; state._setRole=role;
  $("whoName").textContent="Hi, "+(name||"").split(" ")[0];
  $("whoRole").textContent= role==="teacher"?"Teacher":(role==="admin"?"Admin":"Student");
  $("sideNav").innerHTML="";
  $("mainArea").innerHTML=`<div style="max-width:380px;margin:6px auto">
    <h2 style="font-size:20px;margin-bottom:6px">${staff?"Set your own password 🔒":"Set your private PIN 🔒"}</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">For your security, please choose your own ${staff?"password":"PIN"} now. You'll use this to sign in from here on${staff?"":" — your date of birth won't work after this"}.${staff?"":" <b>Pick any 6 numbers</b> you'll remember (please avoid your birthday)."}</p>
    <div class="kf"><label>${staff?"New password (min 6 characters)":"New PIN — exactly 6 digits"}</label><input id="np1" type="password" ${staff?"":'inputmode="numeric"'} maxlength="${staff?32:6}" placeholder="${staff?"choose a password":"6-digit number"}"></div>
    <div class="kf"><label>Confirm</label><input id="np2" type="password" ${staff?"":'inputmode="numeric"'} maxlength="${staff?32:6}" placeholder="re-enter it"></div>
    <div class="formmsg" id="pinMsg"></div>
    <button class="kbtn teal" id="setPinBtn" style="width:100%">Save</button>
  </div>`;
  $("setPinBtn").onclick=saveNewPin;
}
async function saveNewPin(){
  const m=$("pinMsg"); const a=$("np1").value, b=$("np2").value; const staff=state._setRole!=="student";
  if(staff){ if((a||"").length<6){ m.className="formmsg err"; m.textContent="Password must be at least 6 characters."; return; } }
  else { if(!/^\d{6}$/.test(a)){ m.className="formmsg err"; m.textContent="Your PIN must be exactly 6 digits (numbers only)."; return; } }
  if(a!==b){ m.className="formmsg err"; m.textContent="The two don't match."; return; }
  m.className="formmsg ok"; m.textContent="Saving…"; $("setPinBtn").disabled=true;
  const { error:pe } = await db.auth.updateUser({ password:a });
  if(pe){ $("setPinBtn").disabled=false; m.className="formmsg err"; m.textContent="Couldn't save — "+pe.message; return; }
  const { data:{ user } } = await db.auth.getUser();
  await db.from("profiles").update({ pin_set:true }).eq("id", user.id);
  const { data:{ session } } = await db.auth.getSession();
  loadApp(session);
}

async function renderStudentIntake(st){
  try{ await loadClassRefs(); }catch(e){}
  $("whoName").textContent="Hi, "+(((st.full_name||"").split(" ")[0])||"there");

async function submitStudentIntake(){
  const st=state._intakeSt||{}; const minor=!!st.is_minor; const m=$("si_msg");
  const D=id=>((($(id)||{}).value)||"").toString().trim();
  const digits=id=>D(id).replace(/\D/g,"");
  const fail=(id,t)=>{ m.className="formmsg err"; m.textContent=t; const el=$(id); if(el){ el.focus(); el.scrollIntoView({block:"center",behavior:"smooth"}); } return false; };
  if(minor && !D("si_parent")) return fail("si_parent","Please enter the parent/guardian name.");
  const wc=$("si_wa_cc").value, wn=digits("si_wa");
  if(!wn) return fail("si_wa","Please enter a WhatsApp number.");
  if(!phoneOK(wc,wn)) return fail("si_wa","That WhatsApp number doesn't look right — "+wc+" needs "+phoneHint(wc)+".");
  if(!D("si_email")) return fail("si_email","Please enter the email.");
  const ec=$("si_emer_cc").value, en=digits("si_emer");
  if(!en) return fail("si_emer","Please enter an emergency contact number.");
  if(!phoneOK(ec,en)) return fail("si_emer","Emergency contact — "+ec+" needs "+phoneHint(ec)+".");
  if(!D("si_health")) return fail("si_health","Please fill health/safety (write NA if none).");
  if(!D("si_goal")) return fail("si_goal","Please choose a goal.");
  if(!D("si_heard")) return fail("si_heard","Please choose how you found us.");
  if(!D("si_owns")) return fail("si_owns","Please choose whether you own the instrument.");
  if(!$("si_terms").checked){ m.className="formmsg err"; m.textContent="Please tick to acknowledge the IMPORTANT NOTICE."; $("si_terms").focus(); return; }
  if(!D("si_signer")) return fail("si_signer","Please enter the name of the person consenting.");
  const p={ parent_name: minor?D("si_parent"):null, whatsapp: wc+wn,
    email: minor? null : D("si_email"), parent_email: minor? D("si_email") : null,
    emergency_contact: ec+en, goal:D("si_goal"), owns_instrument:D("si_owns")==="yes",
    health_notes:D("si_health"), heard_via:D("si_heard"), consent_signed_by:D("si_signer") };
  $("si_submit").disabled=true; m.className="formmsg ok"; m.textContent="Submitting…";
  const { error } = await db.rpc("submit_intake",{ p });
  if(error){ $("si_submit").disabled=false; m.className="formmsg err"; m.textContent="Couldn't submit — "+error.message; return; }
  m.className="formmsg ok"; m.textContent="✓ Thank you! Opening your app…";
  const { data:{ session } } = await db.auth.getSession();
  setTimeout(()=>loadApp(session), 700);
}

async function loadDashFees(){

  const due=(invs||[]).filter(i=>i.status!=="paid");
  if(!due.length) return;
  const total=due.reduce((a,i)=>a+Number(i.amount||0),0);
  const todayS=todayIST();
  const overdue=due.some(i=>i.due_date && i.due_date<todayS);

  const msg=allSaidPaid
    ? `You've marked your ${INR(total)} fee as paid — the office will confirm it shortly. 💛`
    : (overdue
      ? `Your fee of <b>${INR(total)}</b> is <b>overdue</b>${earliest?` (was due ${esc(earliest)})`:""}. Please pay to keep your classes going.`
      : `You have <b>${INR(total)}</b> in fees due${earliest?` by <b>${esc(earliest)}</b>`:""}.`);
  C.innerHTML=`<div class="panel" style="margin-top:16px;background:${bg};border:1.5px solid var(--saffron)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">

async function loadAtRisk(){
  const C=$("atRisk"); if(!C) return;
  const cutoff=new Date(Date.now()+19800000-21*86400000).toISOString().slice(0,10); // 21 days ago (IST)
  const [studs, att] = await Promise.all([
    db.from("students").select("id,full_name,join_date,branches(name)").eq("status","active"),
    fetchAll(()=> db.from("attendance").select("student_id,class_date").eq("status","present"))
  ]);
  const lastSeen={}; (att||[]).forEach(a=>{ const d=String(a.class_date).slice(0,10); if(!lastSeen[a.student_id]||d>lastSeen[a.student_id]) lastSeen[a.student_id]=d; });
  const risk=((studs&&studs.data)||[]).map(s=>({ name:s.full_name, branch:s.branches&&s.branches.name, last:lastSeen[s.id]||null, join:s.join_date?String(s.join_date).slice(0,10):null }))
    .filter(s=>{ if(s.last) return s.last<cutoff; return s.join ? s.join<cutoff : true; })
    .sort((a,b)=>String(a.last||"").localeCompare(String(b.last||"")));
  if(!risk.length){ C.innerHTML=`<div class="panel" style="margin-top:14px"><h3 style="margin:0">🌟 Retention</h3><div class="mini" style="color:var(--good);margin-top:6px">Every active student has attended within the last 3 weeks. 💛</div></div>`; return; }
  C.innerHTML=`<div class="panel" style="margin-top:14px"><h3 style="margin:0">⚠️ At-risk — no class in 3+ weeks (${risk.length})</h3>
    <p class="mini" style="color:var(--muted);margin:4px 0 8px">Active students who haven't attended recently — a quiet warning before they drift away. A quick call often saves them.</p>
    ${risk.slice(0,25).map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--line);font-size:13px"><span><b>${esc(s.name)}</b>${s.branch?` <span class="mini" style="color:var(--muted)">· ${esc(s.branch)}</span>`:""}</span><span class="mini" style="color:var(--warn)">${s.last?"last seen "+esc(s.last):"never attended"}</span></div>`).join("")}
    ${risk.length>25?`<div class="mini" style="margin-top:6px;color:var(--muted)">…and ${risk.length-25} more</div>`:""}</div>`;
}

  const t=todayIST(); const [Y,Mo]=t.split("-").map(Number);
  const mStart=`${Y}-${PAD(Mo)}-01`;
  const mEnd=`${Y}-${PAD(Mo)}-${PAD(new Date(Y,Mo,0).getDate())}`;
  const mNext=`${Mo===12?Y+1:Y}-${PAD(Mo===12?1:Mo+1)}-01`;
  const weekEnd=new Date(Date.now()+19800000+7*86400000).toISOString().slice(0,10);
  const [invMonth, unpaid, pays, newCnt, breakCnt, activeCnt] = await Promise.all([
    fetchAll(()=> db.from("invoices").select("amount,status,period_start,period_end").lte("period_start",mEnd).gte("period_end",mStart)),
    fetchAll(()=> db.from("invoices").select("amount,due_date,status").neq("status","paid")),
    fetchAll(()=> db.from("payments").select("amount,invoices(students(branch_id))").gte("paid_at",mStart).lt("paid_at",mNext)),
    db.from("students").select("id",{count:"exact",head:true}).gte("join_date",mStart).lte("join_date",mEnd),
    db.from("students").select("id",{count:"exact",head:true}).eq("status","on_break"),
    db.from("students").select("id",{count:"exact",head:true}).eq("status","active")
  ]);
  let billed=0, collected=0;
  (invMonth||[]).forEach(i=>{ const starts=i.period_start?(i.period_start>=mStart):true; if(!starts) return; billed+=Number(i.amount||0); if(i.status==="paid") collected+=Number(i.amount||0); });
  const pending=billed-collected;
  const rate=billed>0?Math.round(collected/billed*100):null;
  let overdueAmt=0, overdueN=0, weekAmt=0, weekN=0;
  (unpaid||[]).forEach(i=>{ if(!i.due_date) return; if(i.due_date<t){ overdueAmt+=Number(i.amount||0); overdueN++; } else if(i.due_date<=weekEnd){ weekAmt+=Number(i.amount||0); weekN++; } });
  const byBranch={};
  (pays||[]).forEach(p=>{ const b=p.invoices&&p.invoices.students&&p.invoices.students.branch_id; if(b) byBranch[b]=(byBranch[b]||0)+Number(p.amount||0); });
  const bname=id=>{ const x=(state.branches||[]).find(b=>b.id===id); return x?x.name:"—"; };
  const branchRows=Object.keys(byBranch).sort((a,b)=>byBranch[b]-byBranch[a]).map(id=>{
    const amt=byBranch[id]; const pct=collected>0?Math.round(amt/collected*100):0;
    return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${esc(bname(id))}</span><b>${INR(amt)}</b></div><div style="height:6px;background:#f0e6cf;border-radius:4px;margin-top:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--saffron-deep)"></div></div></div>`;
  }).join("")||`<div class="mini" style="color:var(--muted)">No payments recorded yet this month.</div>`;
  const rateColor=rate==null?"var(--muted)":(rate>=80?"var(--good)":(rate>=50?"var(--saffron-deep)":"var(--warn)"));
  C.innerHTML=`<div class="panel" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">📊 This month — ${MONS[Mo-1]} ${Y}</h3><span class="rowbtn edit" onclick="gotoNav('fees')">Open Fees →</span></div>
    <div class="kpis" style="margin-top:12px">
      <div class="kpi"><div class="l">Collected</div><div class="v" style="color:var(--good)">${INR(collected)}</div>${rate!=null?`<div class="mini" style="color:${rateColor}">${rate}% of ${INR(billed)} billed</div>`:""}</div>
      <div class="kpi"><div class="l">Pending</div><div class="v" style="color:var(--warn)">${INR(pending)}</div></div>
      <div class="kpi"><div class="l">Overdue now</div><div class="v" style="color:${overdueN?'var(--warn)':'var(--good)'}">${INR(overdueAmt)}</div><div class="mini">${overdueN} invoice${overdueN===1?'':'s'}</div></div>
      <div class="kpi"><div class="l">New students</div><div class="v">${newCnt.count??0}</div><div class="mini">joined this month</div></div>
    </div>
    ${overdueN?`<div style="margin-top:10px;background:#fdecea;border:1px solid #f3c0b8;border-radius:9px;padding:9px 12px;font-size:13px;color:#9B2226">⚠️ <b>${overdueN}</b> overdue invoice${overdueN===1?'':'s'} (${INR(overdueAmt)}) — reminders go out automatically; <span class="rowbtn edit" onclick="gotoNav('fees')" style="margin-left:4px">review</span></div>`:""}
    <div style="margin-top:14px"><div class="mini" style="color:var(--muted);margin-bottom:2px">Collected by branch</div>${branchRows}</div>
    <div style="margin-top:12px;display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted)">
      <span>👥 <b>${activeCnt.count??0}</b> active</span>
      <span>⏸ <b>${breakCnt.count??0}</b> on break</span>
      <span>🗓 <b>${weekN}</b> due this week (${INR(weekAmt)})</span>
    </div>
  </div>`;
}

async function loadAttendance(){
  const date=$("attDate").value, branch=$("attBranch").value;
  const today=todayIST();
  if(!date){ $("attMsg").className="formmsg err"; $("attMsg").textContent="Please pick a date."; return; }
  if(date>today){ $("attMsg").className="formmsg err"; $("attMsg").textContent="Attendance can only be marked for today or a past date."; $("attList").innerHTML=""; return; }
  $("attMsg").textContent=""; $("attList").innerHTML=`<div class="empty">Loading students…</div>`;
  // show students who were active on this date: currently active, OR went inactive AFTER this date — and joined on/before it
  let q=db.from("students").select("id,full_name,branches(name),courses(name)")
    .lte("join_date",date)
    .or(`status.eq.active,status_effective_date.gt.${date}`)
    .order("full_name");
  if(branch) q=q.eq("branch_id",branch);
  const { data:studs, error } = await q;
  if(error){ $("attList").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  const ids=studs.map(s=>s.id);
  let map={};
  if(ids.length){
    const { data:marks } = await db.from("attendance").select("student_id,status").eq("class_date",date).is("batch_id",null).in("student_id",ids);
    (marks||[]).forEach(m=>map[m.student_id]=m.status);
  }
  state._att=map; state._attStuds=studs; state._attDate=date;
  drawAttendance(studs, map);
}
function drawAttendance(studs, map){
  if(!studs.length){ $("attList").innerHTML=`<div class="empty">No active students here.</div>`; return; }
  const n=studs.length, p=Object.values(map).filter(v=>v==="present").length;
  const btn=(id,v,label,cls)=>`<span class="rowbtn" onclick="markAtt('${id}','${v}')" style="margin-right:4px${map[id]===v?(';'+cls):''}">${label}</span>`;
  $("attList").innerHTML=`<div class="mini" style="margin-bottom:8px">${n} active student${n===1?"":"s"} · marked present: ${p}</div>
    <table><tr><th>Student</th><th>Course · Branch</th><th>Mark</th></tr>${studs.map(s=>`<tr>
      <td><b>${esc(s.full_name)}</b></td>
      <td class="mini">${esc(s.courses?.name||"—")} · ${esc(s.branches?.name||"—")}</td>
      <td>${btn(s.id,"present","Present","background:var(--good);color:#fff;border-color:var(--good)")}${btn(s.id,"absent","Absent","background:var(--warn);color:#fff;border-color:var(--warn)")}${btn(s.id,"excused","Excused","background:var(--saffron);color:#3a2c00;border-color:var(--saffron)")}</td>
    </tr>`).join("")}</table>
    <p class="footnote" style="margin-top:26px;border-top:1px solid var(--line);padding-top:14px">Tap Present / Absent / Excused for each student, then click <b>Save attendance</b>.</p>`;
}
function markAtt(id,status){ state._att[id]=status; drawAttendance(state._attStuds, state._att); }
async function saveAttendance(){
  const m=$("attMsg"); const date=state._attDate;
  const today=todayIST();
  if(date>today){ m.className="formmsg err"; m.textContent="Attendance can only be saved for today or a past date."; return; }
  const rows=Object.keys(state._att||{}).filter(sid=>state._att[sid]).map(sid=>({ student_id:sid, class_date:date, status:state._att[sid] }));
  if(!rows.length){ m.className="formmsg err"; m.textContent="Mark at least one student first."; return; }
  m.className="formmsg ok"; m.textContent="Saving…";
  const ids=rows.map(r=>r.student_id);
  await db.from("attendance").delete().eq("class_date",date).is("batch_id",null).in("student_id",ids);
  const { error } = await db.from("attendance").insert(rows);
  if(error){ m.className="formmsg err"; m.textContent="Couldn't save — "+error.message; return; }
  m.className="formmsg ok"; m.textContent="✓ Saved attendance for "+date+" ("+rows.length+" students).";
}

function drawAttReport(){

async function adminRaisePlan(sid){

function finPeriod(){ const v=($("finMonth")&&$("finMonth").value)||new Date().toISOString().slice(0,7); const [y,m]=v.split("-").map(Number); const start=`${y}-${PAD(m)}-01`; const end=new Date(y,m,0).toISOString().slice(0,10); const next=`${m===12?y+1:y}-${PAD(m===12?1:m+1)}-01`; return { v, label:MONS[m-1]+" "+y, start, end, next }; }
const FREQ_LABEL={ weekly:"↻ Weekly", monthly:"↻ Monthly", yearly:"↻ Yearly" };
function parseD(s){ const [y,m,d]=String(s).split("-").map(Number); return new Date(y,m-1,d); }
// amount an expense contributes to the month described by P (cash basis: yearly counts fully in its anniversary month)
function expenseMonthAmount(e,P){
  const f=e.frequency||"one_time"; const amt=Number(e.amount||0); const start=e.spent_on; if(!start) return 0;
  if(f==="one_time") return (start>=P.start && start<=P.end)?amt:0;
  if(start>P.end) return 0;                                   // hasn't started yet
  if(e.recur_until && e.recur_until<P.start) return 0;        // already ended
  if(f==="monthly") return amt;
  if(f==="yearly")  return start.slice(5,7)===P.start.slice(5,7)?amt:0;
  if(f==="weekly"){
    const wd=parseD(start).getDay();
    let from=parseD(start)>parseD(P.start)?parseD(start):parseD(P.start);
    let to=parseD(P.end); if(e.recur_until && parseD(e.recur_until)<to) to=parseD(e.recur_until);
    let n=0; for(let d=new Date(from); d<=to; d.setDate(d.getDate()+1)) if(d.getDay()===wd) n++;
    return amt*n;
  }
  return 0;
}

  const { data:exps, error } = await db.from("expenses").select("id,category,subcategory,amount,branch_id,spent_on,note,frequency,recur_until").lte("spent_on",P.end).order("spent_on",{ascending:false});
  if(error){ $("finBody").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  state._fin={ pays:pays||[], exps:exps||[], P }; drawFinance();
}
function drawFinance(){
  const { pays, exps, P } = state._fin;
  const bname=id=>{ const b=state.branches.find(x=>x.id===id); return b?b.name:"—"; };
  let income=0, regIncome=0, regCount=0; const incByBranch={};
  pays.forEach(p=>{ const a=Number(p.amount||0); income+=a; const bid=p.invoices?.students?.branch_id||"none"; incByBranch[bid]=(incByBranch[bid]||0)+a; if(Number(p.invoices?.registration||0)>0){ regIncome+=a; regCount++; } });
  const tuitionIncome=income-regIncome;
  let expense=0; const expByBranch={}, expByCat={};
  const erows=[]; // {e, amt} contributing to this month
  exps.forEach(e=>{ const a=expenseMonthAmount(e,P); if(a<=0) return; erows.push({e,amt:a}); expense+=a; const bid=e.branch_id||"none"; expByBranch[bid]=(expByBranch[bid]||0)+a; let c=e.category||"Other"; if(/instrument/i.test(c) && e.subcategory) c=c+" · "+e.subcategory; expByCat[c]=(expByCat[c]||0)+a; });
  const net=income-expense;
  $("finKpis").innerHTML=`<div class="kpi"><div class="l">Income (${esc(P.label)})</div><div class="v" style="color:var(--good)">${INR(income)}</div><div class="mini" style="color:var(--muted)">Tuition ${INR(tuitionIncome)} · Registration ${INR(regIncome)}</div></div>
    <div class="kpi"><div class="l">Registration fees</div><div class="v">${INR(regIncome)}</div><div class="mini">${regCount} new student${regCount===1?'':'s'} this month</div></div>
    <div class="kpi"><div class="l">Expenses</div><div class="v" style="color:var(--warn)">${INR(expense)}</div></div>
    <div class="kpi"><div class="l">Net (P/L)</div><div class="v" style="color:${net<0?"var(--warn)":"var(--ink)"}">${INR(net)}</div></div>`;
  const branchRows=state.branches.map(b=>{ const inc=incByBranch[b.id]||0, ex=expByBranch[b.id]||0; return `<tr><td><b>${esc(b.name)}</b></td><td>${INR(inc)}</td><td>${INR(ex)}</td><td>${INR(inc-ex)}</td></tr>`; }).join("");
  const uEx=expByBranch["none"]||0, uIn=incByBranch["none"]||0;
  const catKeys=Object.keys(expByCat).sort();
  const catRows=catKeys.length?catKeys.map(c=>`<tr><td>${esc(c)}</td><td>${INR(expByCat[c])}</td></tr>`).join(""):`<tr><td colspan="2" class="mini">No expenses this month.</td></tr>`;
  const fbadge=e=>{ const f=e.frequency||"one_time"; return f!=="one_time"?` <span class="badge b-teal">${FREQ_LABEL[f]||f}</span>`:""; };
  const expList=erows.length?erows.map(({e,amt})=>`<tr><td>${e.spent_on}</td><td>${esc(e.category)}${e.subcategory?" · "+esc(e.subcategory):""}${fbadge(e)}</td><td>${esc(bname(e.branch_id))}</td><td>${INR(amt)}</td><td class="mini">${esc(e.note||"")}${e.frequency&&e.frequency!=="one_time"?`<br><span class="mini" style="color:var(--muted)">recurs from ${esc(e.spent_on)}${e.recur_until?" until "+esc(e.recur_until):""}</span>`:""}<br><span class="rowbtn edit" onclick="editExpense('${e.id}')">✏️ Edit</span><span class="rowbtn danger" onclick="delExpense('${e.id}')">Delete</span></td></tr>`).join(""):`<tr><td colspan="5" class="empty">No expenses recorded for ${esc(P.label)}.</td></tr>`;
  $("finBody").innerHTML=`<div class="row2">
      <div class="panel"><h3>Profit / Loss per centre</h3>
        <table><tr><th>Branch</th><th>Income</th><th>Expenses</th><th>Net</th></tr>${branchRows}
          ${(uEx||uIn)?`<tr><td class="mini">Not branch-specific</td><td>${INR(uIn)}</td><td>${INR(uEx)}</td><td>${INR(uIn-uEx)}</td></tr>`:""}</table></div>
      <div class="panel"><h3>Expenses by category</h3><table><tr><th>Category</th><th>Amount</th></tr>${catRows}</table></div>
    </div>
    <div class="panel" style="margin-top:14px"><h3>Expense entries — ${esc(P.label)}</h3>
      <table><tr><th>Date</th><th>Category</th><th>Branch</th><th>Amount</th><th>Note</th></tr>${expList}</table></div>`;
}
async function addExpense(){
  const m=$("xMsg"); const cat=$("x_cat").value.trim(), sub=$("x_sub").value.trim(), amt=Number($("x_amt").value), branch=$("x_branch").value, date=$("x_date").value, note=$("x_note").value.trim();
  if(!cat) return failMsg(m,"Enter a category.");
  if(!amt||amt<=0) return failMsg(m,"Enter a valid amount.");
  if(!date) return failMsg(m,"Pick a date.");
  const freq=$("x_freq")?$("x_freq").value:"one_time";
  const until=($("x_until")&&$("x_until").value)||null;
  m.className="formmsg ok"; m.textContent="Saving…"; $("addExpense").disabled=true;
  const rec={ category:cat, subcategory:sub||null, amount:amt, branch_id:branch||null, spent_on:date, note:note||null, frequency:freq, recur_until: freq==="one_time"?null:until };
  let error;
  if(state._expEdit){ ({ error } = await db.from("expenses").update(rec).eq("id",state._expEdit)); }
  else { ({ error } = await db.from("expenses").insert(rec)); }
  $("addExpense").disabled=false;
  if(error) return failMsg(m,"Couldn't save — "+error.message);
  m.className="formmsg ok"; m.textContent=state._expEdit?"✓ Expense updated.":"✓ Expense added.";

  loadFinance();
}
function editExpense(id){
  const e=((state._fin&&state._fin.exps)||[]).find(x=>x.id===id); if(!e) return;
  state._expEdit=id;
  $("x_cat").value=e.category||""; $("x_sub").value=e.subcategory||"";
  $("x_amt").value=e.amount||""; $("x_branch").value=e.branch_id||"";
  $("x_date").value=e.spent_on||""; $("x_note").value=e.note||"";
  if($("x_freq")) $("x_freq").value=e.frequency||"one_time";
  if($("x_until")) $("x_until").value=e.recur_until||"";
  onFreqChange();
  $("expFormTitle").textContent="Edit expense";
  $("addExpense").textContent="Save changes"; $("expCancelBtn").style.display="inline-block";
  window.scrollTo({top:0,behavior:"smooth"});
}
function cancelExpEdit(){
  state._expEdit=null;
  ["x_cat","x_sub","x_amt","x_note"].forEach(i=>{ if($(i)) $(i).value=""; }); if($("x_branch")) $("x_branch").value="";
  if($("x_date")) $("x_date").value=new Date().toISOString().slice(0,10);
  if($("x_freq")) $("x_freq").value="one_time"; if($("x_until")) $("x_until").value=""; onFreqChange();
  if($("expFormTitle")) $("expFormTitle").textContent="Record an expense";

async function delExpense(id){
  if(!confirm("Delete this expense entry?")) return;
  const { error } = await db.from("expenses").delete().eq("id",id);
  if(error){ alert("Couldn't delete — "+error.message); return; }
  loadFinance();
}

async function loadPayouts(){
  const v=$("poMonth").value||new Date().toISOString().slice(0,7); const [y,mo]=v.split("-").map(Number);
  const start=`${y}-${PAD(mo)}-01`, next=`${mo===12?y+1:y}-${PAD(mo===12?1:mo+1)}-01`, label=MONS[mo-1]+" "+y;
  state._poPeriod=v; state._poLabel=label;
  $("poBody").innerHTML=`<div class="empty">Loading…</div>`;
  const { data:teachers } = await db.from("teachers").select("id,payout_pct,profiles(full_name)").eq("is_active",true);
  const pctMap={}, nameMap={}; (teachers||[]).forEach(t=>{ pctMap[t.id]=t.payout_pct||40; nameMap[t.id]=t.profiles?.full_name||"(guru)"; });
  const { data:studs } = await db.from("students").select("id,primary_teacher_id,status");
  const stuTeacher={}, activeByT={}; (studs||[]).forEach(s=>{ if(s.primary_teacher_id){ stuTeacher[s.id]=s.primary_teacher_id; if(s.status==="active") activeByT[s.primary_teacher_id]=(activeByT[s.primary_teacher_id]||0)+1; } });
  const sids=Object.keys(stuTeacher);
  // Prefer the server-side aggregate (correct + fast at any scale). Falls back to the client calc if the DB function isn't deployed yet.
  const grossByT={};
  const { data:gg, error:ggErr } = await db.rpc("guru_gross_in_range", { p_start:start, p_end:next });
  if(!ggErr && Array.isArray(gg)){ gg.forEach(r=>{ grossByT[r.teacher_id]=Number(r.gross||0); }); }
  else {
    let invMap={};
    if(sids.length){ const invs = await fetchAll(()=> db.from("invoices").select("id,student_id,amount").in("student_id",sids)); (invs||[]).forEach(i=>{ invMap[i.id]={t:stuTeacher[i.student_id], amt:Number(i.amount||0)}; }); }
    const invIds=Object.keys(invMap);
    // guru share is on TUITION only (invoice.amount); registration invoices have amount 0, so they're excluded. Count each invoice once.
    if(invIds.length){ const pays = await fetchAll(()=> db.from("payments").select("invoice_id,paid_at").in("invoice_id",invIds).gte("paid_at",start).lt("paid_at",next)); const counted=new Set(); (pays||[]).forEach(p=>{ if(counted.has(p.invoice_id)) return; counted.add(p.invoice_id); const mp=invMap[p.invoice_id]; if(mp&&mp.t) grossByT[mp.t]=(grossByT[mp.t]||0)+mp.amt; }); }
  }
  const { data:paid } = await db.from("guru_payouts").select("teacher_id,amount").eq("period",v);
  const paidByT={}; (paid||[]).forEach(p=>{ paidByT[p.teacher_id]=(paidByT[p.teacher_id]||0)+Number(p.amount||0); });
  const { data:plans } = await db.from("guru_payout_plan").select("teacher_id,pct,bonus,bonus_reason,deduction,deduction_reason").eq("period",v);
  const planByT={}; (plans||[]).forEach(p=>{ planByT[p.teacher_id]=p; });
  state._poNames=nameMap;
  state._poData={ teachers:teachers||[], pctMap, nameMap, activeByT, grossByT, paidByT, planByT };
  drawPayouts();
}

      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;gap:8px;flex-wrap:wrap"><span class="mini" style="color:var(--muted)">Paid ${INR(paid)} · Balance <b class="po_bal"></b></span><span><span class="rowbtn" onclick="savePlan('${t.id}')">Save adjustments</span> <span class="rowbtn edit" onclick="recordPayoutForm('${t.id}')">💰 Record payment</span> <span class="mini po_saved" id="po_saved_${t.id}" style="color:var(--good);display:none">✓ saved</span></span></div>
      <div class="poForm" id="poForm_${t.id}" style="display:none;margin-top:8px"></div>
    </div>`;
  }).join("");
  document.querySelectorAll(".poGard").forEach(c=>{ c.querySelectorAll(".po_pct,.po_bonus,.po_ded").forEach(i=>i.addEventListener("input",recalcPayouts)); });
  recalcPayouts(); loadPayoutHistory();
}
function recalcPayouts(){
  let totDue=0, totPaid=0;
  document.querySelectorAll(".poGard").forEach(c=>{
    const base=parseFloat(c.dataset.base)||0, paid=parseFloat(c.dataset.paid)||0;
    const pct=parseFloat(c.querySelector(".po_pct").value)||0, bonus=parseFloat(c.querySelector(".po_bonus").value)||0, ded=parseFloat(c.querySelector(".po_ded").value)||0;
    const share=Math.round(base*pct/100), fin=Math.round(share+bonus-ded);
    c.querySelector(".po_share").textContent=INR(share);
    c.querySelector(".po_final").textContent=INR(fin);
    const balEl=c.querySelector(".po_bal"); balEl.textContent=INR(fin-paid); balEl.style.color=(fin-paid)>0?"var(--warn)":"var(--good)";
    totDue+=fin; totPaid+=paid;
  });
  if($("poKpis")) $("poKpis").innerHTML=`<div class="kpi"><div class="l">Total payout · ${esc(state._poLabel||"")}</div><div class="v">${INR(totDue)}</div></div>
    <div class="kpi"><div class="l">Total paid</div><div class="v" style="color:var(--good)">${INR(totPaid)}</div></div>
    <div class="kpi"><div class="l">Outstanding</div><div class="v" style="color:${totDue-totPaid>0?'var(--warn)':'var(--ink)'}">${INR(totDue-totPaid)}</div></div>`;
}

async function loadEnquiries(){
  const { data, error } = await db.from("enquiries")
    .select("id,name,phone,whatsapp,source,stage,mode,message,follow_up_log,created_at,course_id,branch_id,courses(name),branches(name)")
    .order("created_at",{ascending:false});
  if(error){ $("enqList").innerHTML=`<div class="cfgwarn">Couldn't load — ${esc(error.message)}</div>`; return; }
  state._enq=data||[]; drawEnquiries();
}
function drawEnquiries(){
  const all=state._enq||[];
  const counts={ new:0, following_up:0, trial_booked:0, converted:0, lost:0 };
  all.forEach(e=>{ if(counts[e.stage]!=null) counts[e.stage]++; });
  const open=counts.new+counts.following_up+counts.trial_booked;
  $("enqKpis").innerHTML=`<div class="kpi"><div class="l">Open leads</div><div class="v">${open}</div></div>
    <div class="kpi"><div class="l">Following up</div><div class="v" style="color:var(--warn)">${counts.following_up}</div></div>
    <div class="kpi"><div class="l">Trial booked</div><div class="v">${counts.trial_booked}</div></div>
    <div class="kpi"><div class="l">Converted</div><div class="v" style="color:var(--good)">${counts.converted}</div></div>`;
  const q=(($("enqSearch")&&$("enqSearch").value)||"").toLowerCase().trim();
  const f=($("enqFilter")&&$("enqFilter").value)||"";
  let list=all.filter(e=>{
    if(f==="open"){ if(e.stage==="converted"||e.stage==="lost") return false; }
    else if(f && e.stage!==f) return false;
    if(q){ const hay=((e.name||"")+" "+(e.phone||"")+" "+(e.whatsapp||"")).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  if(!list.length){ $("enqList").innerHTML=`<div class="empty">No enquiries${f||q?" match this filter":" yet — log your first above"}.</div>`; return; }
  const stageSel=e=>`<select class="enqStage" onchange="setEnqStage('${e.id}',this.value)">${ENQ_STAGES.map(s=>`<option value="${s[0]}"${e.stage===s[0]?" selected":""}>${s[1]}</option>`).join("")}</select>`;
  $("enqList").innerHTML=`<table><tr><th>Name</th><th>Interest</th><th>Source</th><th>Stage</th><th>Added</th><th></th></tr>
    ${list.map(e=>`<tr>
      <td><b>${esc(e.name)}</b>${e.phone?`<br><span class="mini">${esc(e.phone)}</span>`:""}</td>
      <td>${esc(e.courses?.name||"—")}${e.branches?.name?`<br><span class="mini">${esc(e.branches.name)}</span>`:""}</td>
      <td>${esc(ENQ_SRC_LABEL[e.source]||e.source||"—")}</td>
      <td>${stageSel(e)}</td>
      <td class="mini">${String(e.created_at).slice(0,10)}</td>
      <td class="mini"><span class="rowbtn edit" onclick="editEnquiry('${e.id}')">✏️ Edit</span><span class="rowbtn" onclick="logEnqNote('${e.id}')">Note</span><span class="rowbtn" onclick="convertEnq('${e.id}')">Convert</span><span class="rowbtn danger" onclick="delEnquiry('${e.id}')">Delete</span></td>
    </tr>${e.follow_up_log?`<tr class="enqlog"><td colspan="6" class="mini" style="white-space:pre-wrap;color:#666;padding-top:0">${esc(e.follow_up_log)}</td></tr>`:""}`).join("")}</table>`;
}
async function addEnquiry(){
  const m=$("eMsg"); const name=$("e_name").value.trim(), phone=$("e_phone").value.trim();
  if(!name) return failMsg(m,"Enter a name.");
  const rec={ name, phone:phone||null, whatsapp:phone||null, course_id:$("e_course").value||null, branch_id:$("e_branch").value||null, source:$("e_source").value, mode:$("e_mode").value, message:$("e_msg").value.trim()||null };
  m.className="formmsg ok"; m.textContent="Saving…"; $("addEnq").disabled=true;
  let error;
  if(state._enqEdit){ ({ error } = await db.from("enquiries").update(rec).eq("id",state._enqEdit)); }
  else { ({ error } = await db.from("enquiries").insert(rec)); }
  $("addEnq").disabled=false;
  if(error) return failMsg(m,"Couldn't save — "+error.message);
  m.className="formmsg ok"; m.textContent=state._enqEdit?"✓ Enquiry updated.":"✓ Enquiry logged.";
  cancelEnqEdit();
  loadEnquiries();
}
function editEnquiry(id){
  const e=(state._enq||[]).find(x=>x.id===id); if(!e) return;
  state._enqEdit=id;
  $("e_name").value=e.name||""; $("e_phone").value=e.phone||e.whatsapp||"";
  $("e_course").value=e.course_id||""; $("e_branch").value=e.branch_id||"";
  $("e_source").value=e.source||"website"; $("e_mode").value=e.mode||"in_person";
  $("e_msg").value=e.message||"";
  $("enqFormTitle").textContent="Edit enquiry — "+(e.name||"");
  $("addEnq").textContent="Save changes"; $("enqCancelBtn").style.display="inline-block";
  window.scrollTo({top:0,behavior:"smooth"});
}
function cancelEnqEdit(){
  state._enqEdit=null;
  ["e_name","e_phone","e_msg"].forEach(i=>{ if($(i)) $(i).value=""; });
  if($("e_course")) $("e_course").value=""; if($("e_branch")) $("e_branch").value="";
  if($("enqFormTitle")) $("enqFormTitle").textContent="Log a new enquiry";
  if($("addEnq")) $("addEnq").textContent="Add enquiry";
  if($("enqCancelBtn")) $("enqCancelBtn").style.display="none";
}
async function setEnqStage(id,stage){
  const { error } = await db.from("enquiries").update({ stage }).eq("id",id);
  if(error){ alert("Couldn't update — "+error.message); return; }
  const e=(state._enq||[]).find(x=>x.id===id); if(e) e.stage=stage;
  drawEnquiries();
}
async function logEnqNote(id){
  const txt=prompt("Add a follow-up note (e.g. 'Called — will visit Sat'):");
  if(txt==null||!txt.trim()) return;
  const e=(state._enq||[]).find(x=>x.id===id);
  const stamp=new Date().toISOString().slice(0,10);
  const line=`${stamp}: ${txt.trim()}`;
  const merged=e&&e.follow_up_log?(e.follow_up_log+"\n"+line):line;
  const { error } = await db.from("enquiries").update({ follow_up_log:merged }).eq("id",id);
  if(error){ alert("Couldn't save note — "+error.message); return; }
  if(e) e.follow_up_log=merged;
  drawEnquiries();
}
async function convertEnq(id){
  if(!confirm("Mark this lead as Converted and open Quick Register, pre-filled with their details?")) return;
  const { data:eq } = await db.from("enquiries").select("id,name,phone,whatsapp,branch_id,course_id").eq("id",id).maybeSingle();
  const { error } = await db.from("enquiries").update({ stage:"converted" }).eq("id",id);
  if(error){ alert("Couldn't update — "+error.message); return; }
  const e=(state._enq||[]).find(x=>x.id===id); if(e) e.stage="converted";
  state._convertEnq=eq||null; state._intakeMode='';   // prefill Quick Register + remember which lead to link
  gotoNav("intake");
}
async function delEnquiry(id){
  if(!confirm("Delete this enquiry? This can't be undone.")) return;
  const { error } = await db.from("enquiries").delete().eq("id",id);
  if(error){ alert("Couldn't delete — "+error.message); return; }
  state._enq=(state._enq||[]).filter(x=>x.id!==id); drawEnquiries();
}

function drawInventory(){
  const all=state._inv||[];
  const bname=id=>{ const b=state.branches.find(x=>x.id===id); return b?b.name:"—"; };
  let totVal=0, attention=0;
  all.forEach(i=>{ totVal+=Number(i.purchase_cost||0); if(i.condition==="Needs service"||i.condition==="Under repair") attention++; });
  $("invKpis").innerHTML=`<div class="kpi"><div class="l">Total items</div><div class="v">${all.length}</div></div>

    <div class="kpi"><div class="l">Total purchase value</div><div class="v">${INR(totVal)}</div></div>`;
  const q=(($("invSearch")&&$("invSearch").value)||"").toLowerCase().trim();
  const bf=($("invBranchF")&&$("invBranchF").value)||"";
  const cf=($("invCondF")&&$("invCondF").value)||"";
  let list=all.filter(i=>{
    if(bf && i.branch_id!==bf) return false;
    if(cf && i.condition!==cf) return false;
    if(q && !((i.name||"").toLowerCase().includes(q))) return false;
    return true;

  if(!list.length){ $("invList").innerHTML=`<div class="empty">No items${q||bf||cf?" match this filter":" yet — add your first above"}.</div>`; return; }

const SUGG_STAGES=[["new","New"],["reviewed","Reviewed"],["actioned","Actioned"]];

async function loadSuggestions(){

function drawSuggestions(){
  const all=state._sug||[];
  const c={ new:0, reviewed:0, actioned:0 };
  all.forEach(s=>{ if(c[s.status]!=null) c[s.status]++; });
  $("sugKpis").innerHTML=`<div class="kpi"><div class="l">New</div><div class="v" style="color:var(--warn)">${c.new}</div></div>

    <div class="kpi"><div class="l">Actioned</div><div class="v" style="color:var(--good)">${c.actioned}</div></div>`;
  const q=(($("sugSearch")&&$("sugSearch").value)||"").toLowerCase().trim();
  const f=($("sugFilter")&&$("sugFilter").value)||"";
  let list=all.filter(s=>{
    if(f==="open"){ if(s.status==="actioned") return false; }
    else if(f && s.status!==f) return false;
    if(q && !((s.body||"").toLowerCase().includes(q))) return false;
    return true;
  });
  if(!list.length){ $("sugList").innerHTML=`<div class="empty">No suggestions${f||q?" match this filter":" yet. These arrive once students & teachers can submit from their app."}.</div>`; return; }

          ${s.category?` · ${esc(s.category)}`:""}${s.from_role?` · from a ${esc(s.from_role)}`:""} · ${String(s.created_at).slice(0,10)}</div>
        <div style="white-space:nowrap">${stageSel(s)} <span class="rowbtn danger" onclick="delSuggestion('${s.id}')">Delete</span></div>
      </div>
      <p style="margin:10px 0 0;white-space:pre-wrap">${esc(s.body)}</p>
    </div>`).join("");
}

function weekRange(dateStr){ const d=parseD(dateStr); const diffToMon=(d.getDay()+6)%7; const mon=new Date(d); mon.setDate(d.getDate()-diffToMon); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return { start:isoLocal(mon), end:isoLocal(sun) }; }
async function loadMyAtt(){

async function buildShareImage(n, withPoster){
  const W=1080, pad=60, innerW=W-pad*2;
  let logo=null, poster=null;
  try{ logo=await annLoadImg("kala-kuteer-logo.png"); }catch(e){}
  if(withPoster && n.media_url && /(\.(png|jpe?g|gif|webp)(\?|$)|\/uploads\/)/i.test(n.media_url)){ try{ poster=await annLoadImg(n.media_url,true); }catch(e){ poster=null; } }
  const c=document.createElement("canvas"); const ctx=c.getContext("2d");
  const titleFont="700 52px Georgia, serif", bodyFont="32px Arial, sans-serif";
  function wrap(text,font,maxW){ ctx.font=font; const ws=(text||"").replace(/\s+/g," ").trim().split(" ").filter(Boolean); const ls=[]; let ln="";
    for(const w of ws){ const t=ln?ln+" "+w:w; if(ctx.measureText(t).width>maxW && ln){ ls.push(ln); ln=w; } else ln=t; } if(ln) ls.push(ln); return ls; }
  const tLines=wrap(n.title||"", titleFont, innerW);
  let bLines=n.body?wrap(n.body, bodyFont, innerW):[];
  if(bLines.length>7){ bLines=bLines.slice(0,7); bLines[6]=bLines[6]+"…"; }
  const logoW=logo?Math.min(420,innerW):0, logoH=logo?logoW*logo.height/logo.width:0;
  let posW=0,posH=0; if(poster){ posW=innerW; posH=posW*poster.height/poster.width; if(posH>820){ posH=820; posW=posH*poster.width/poster.height; } }
  const footerH=100;
  const h=pad + (logo?logoH+34:0) + tLines.length*64 + 18 + (bLines.length?bLines.length*44+18:0) + (poster?posH+30:0) + 24 + footerH;
  c.width=W; c.height=Math.round(h);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,c.height);
  ctx.lineWidth=6; ctx.strokeStyle="#F0A92B"; ctx.strokeRect(3,3,W-6,c.height-6);
  ctx.textAlign="center"; ctx.textBaseline="top"; let y=pad;
  if(logo){ try{ ctx.drawImage(logo,(W-logoW)/2,y,logoW,logoH); }catch(e){} y+=logoH+34; }
  ctx.fillStyle="#7A2233"; ctx.font=titleFont; tLines.forEach(l=>{ ctx.fillText(l,W/2,y); y+=64; }); y+=18;
  if(bLines.length){ ctx.fillStyle="#4a4036"; ctx.font=bodyFont; bLines.forEach(l=>{ ctx.fillText(l,W/2,y); y+=44; }); y+=18; }
  if(poster){ try{ ctx.drawImage(poster,(W-posW)/2,y,posW,posH); y+=posH+30; }catch(e){} }
  ctx.fillStyle="#7A2233"; ctx.fillRect(0,c.height-footerH,W,footerH);
  ctx.fillStyle="#fff"; ctx.font="30px Arial, sans-serif"; ctx.textBaseline="middle";
  ctx.fillText("kalakuteer.org    ·    +91 8400806285", W/2, c.height-footerH/2);
  return await new Promise(res=>{ try{ c.toBlob(b=>res(b),"image/png"); }catch(e){ res(null); } });
}

/* ---------------- GURU SAMVAAD (quarterly 1:1 student–guru feedback session) ---------------- */
function addMonths(d,m){ return new Date(d.getFullYear(), d.getMonth()+m, d.getDate()); }
function isoLocal(d){ return `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`; }
function fmtNiceDate(s){ const [y,m,dd]=String(s).slice(0,10).split("-").map(Number); return `${dd} ${MONS[m-1]} ${y}`; }
function fmtDateTime(s){ const d=new Date(s); return `${d.getDate()} ${MONS[d.getMonth()]} ${d.getFullYear()}, ${(d.getHours()%12||12)}:${PAD(d.getMinutes())} ${d.getHours()<12?"AM":"PM"}`; }
// quarterly from join date → which cycle is actionable + its state
function ptmStatus(joinDate, today, srv){
  const j=parseD(joinDate);
  let months=(today.getFullYear()-j.getFullYear())*12+(today.getMonth()-j.getMonth());
  if(today.getDate()<j.getDate()) months--;
  const n=Math.max(0,Math.floor(months/3));
  const pastB=addMonths(j,n*3), nextB=addMonths(j,(n+1)*3);
  const keyPast=isoLocal(pastB), keyNext=isoLocal(nextB);
  const rPast=srv.find(r=>r.quarter_label===keyPast), rNext=srv.find(r=>r.quarter_label===keyNext);
  const daysSincePast=Math.round((today-pastB)/864e5), daysToNext=Math.round((nextB-today)/864e5);
  if(rNext && rNext.status==="scheduled") return { state:"scheduled", cycle:keyNext, review:rNext };
  if(rPast && rPast.status==="scheduled") return { state:"scheduled", cycle:keyPast, review:rPast };
  if(rPast && rPast.status==="completed"){ return (daysToNext<=30)?{ state:"due", cycle:keyNext }:{ state:"upcoming", cycle:keyNext }; }
  if(n>=1){ return (daysSincePast>14)?{ state:"overdue", cycle:keyPast }:{ state:"due", cycle:keyPast }; }
  return (daysToNext<=30)?{ state:"due", cycle:keyNext }:{ state:"upcoming", cycle:keyNext };
}

  const role=state.role; let students=[]; let tid=null;
  if(role==="teacher"){
    tid=await myTeacherId();
    if(!tid){ M.innerHTML=`<div class="ph"><div><h2>Guru Samvaad</h2></div></div><div class="cfgwarn">Your guru profile isn't fully set up yet. Ask the admin to check your account.</div>`; return; }
    const { data } = await db.from("students").select("id,full_name,join_date,branches(name)").eq("primary_teacher_id",tid).eq("status","active").order("full_name");
    students=data||[];
  } else {
    const { data } = await db.from("students").select("id,full_name,join_date,branches(name)").eq("status","active").order("full_name");
    students=data||[];
  }
  state._ptmTid=tid; state._ptmStudents=students;
  const ids=students.map(s=>s.id); let reviews=[];
  if(ids.length){ const { data:rv } = await db.from("progress_reviews").select("id,student_id,quarter_label,scheduled_at,meeting_link,status,teacher_id").in("student_id",ids); reviews=rv||[]; }
  state._ptmReviews=reviews; drawReviews();
}
function drawReviews(){
  const students=state._ptmStudents||[]; const reviews=state._ptmReviews||[];
  const M=$("mainArea"); const today=new Date(); today.setHours(0,0,0,0);
  const rows=students.filter(s=>s.join_date).map(s=>({ s, info:ptmStatus(s.join_date,today,reviews.filter(r=>r.student_id===s.id)) }));
  const order={overdue:0,due:1,scheduled:2,upcoming:3,done:4};
  rows.sort((a,b)=>(order[a.info.state]-order[b.info.state]) || (a.info.cycle<b.info.cycle?-1:1));
  const dueCount=rows.filter(r=>r.info.state==="overdue"||r.info.state==="due").length;
  const noJoin=students.filter(s=>!s.join_date).length;
  const card=({s,info})=>{
    const sid=s.id; let line="", act="";
    if(info.state==="scheduled"){ const r=info.review;
      line=`Scheduled for <b>${fmtDateTime(r.scheduled_at)}</b>${r.meeting_link?` · <a href="${esc(safeUrl(r.meeting_link))}" target="_blank" rel="noopener">link</a>`:""}`;
      act=`<span class="rowbtn" onclick="togglePtmForm('${sid}','${info.cycle}')">Reschedule</span><span class="rowbtn edit" onclick="completePtm('${r.id}','${sid}')">✓ Mark done</span><span class="rowbtn danger" onclick="cancelPTM('${r.id}')">Cancel</span>`;
    } else if(info.state==="overdue"){ line=`Was due around <b>${fmtNiceDate(info.cycle)}</b> — not yet scheduled`; act=`<span class="rowbtn edit" onclick="togglePtmForm('${sid}','${info.cycle}')">📅 Schedule Guru Samvaad</span>`;
    } else if(info.state==="due"){ line=`Due around <b>${fmtNiceDate(info.cycle)}</b>`; act=`<span class="rowbtn edit" onclick="togglePtmForm('${sid}','${info.cycle}')">📅 Schedule Guru Samvaad</span>`;
    } else { line=`Next session around <b>${fmtNiceDate(info.cycle)}</b>`; act=`<span class="rowbtn" onclick="togglePtmForm('${sid}','${info.cycle}')">📅 Schedule early</span>`; }
    const doneCount=reviews.filter(r=>r.student_id===sid && r.status==="completed").length;
    return `<div class="panel" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div><b>${esc(s.full_name)}</b> <span class="mini">· ${esc(s.branches?.name||"—")}</span>
          <div class="mini" style="margin-top:3px">${line}</div></div>
        <span class="badge ${PTM_BADGE[info.state]}">${PTM_LABEL[info.state]}</span>
      </div>
      <div id="ptmAct_${sid}" style="margin-top:10px">${act}</div>
      ${doneCount?`<div style="margin-top:8px"><span class="rowbtn" onclick="viewPtmHistory('${sid}')">📖 Past Guru Samvaad (${doneCount})</span></div>`:""}
      <div id="ptmHist_${sid}"></div></div>`;
  };
  M.innerHTML=`<div class="ph"><div><h2>Guru Samvaad${tip("A quarterly 1:1 with each student, timed from their joining date. Schedule it, then mark it done with feedback notes (required) that the student can see.")}</h2><p>A quarterly one-on-one between student &amp; guru — feedback &amp; progress — timed from each student's joining date</p></div></div>
    <div style="background:#fff7e8;border-radius:10px;padding:13px 15px;margin-bottom:14px;line-height:1.6;font-size:13.5px">
      Who understands your progress better than your guru — the one who quietly watches you grow, day after day, as you find your voice on this journey? A <b>Guru Samvaad</b> is your moment to pause together and truly see how you're performing, where you're growing, and what to work on next.<br><br>
      We warmly encourage every student to sit with their guru at least <b>once a quarter</b>. It's a small, honest conversation — but the kind that can shape the months ahead. And if you'd like a parent or family member to be part of this conversation, they are always most welcome. Your guru sees you, and is always cheering you on. 💛
    </div>
    ${dueCount?`<div class="cfgwarn" style="background:#fff7e8;border:0">🔔 <b>${dueCount}</b> student${dueCount===1?"":"s"} due for their Guru Samvaad this quarter — schedule below.</div>`:`<span class="ok-pill">✓ No sessions due right now</span>`}
    <p class="footnote" style="margin:8px 0 14px">Sessions are scheduled by the guru.</p>
    ${rows.length?rows.map(card).join(""):`<div class="empty">No students to review yet.</div>`}
    ${noJoin?`<p class="footnote">${noJoin} student(s) have no joining date set, so their cycle can't be calculated — add it on their profile.</p>`:""}`;
}
function togglePtmForm(sid, cycleKey){
  const A=$("ptmAct_"+sid); if(!A) return;
  const def=cycleKey+"T17:00";
  A.innerHTML=`<div class="form2"><div class="kf"><label>Date &amp; time</label><input type="datetime-local" id="ptm_dt_${sid}" value="${def}"></div>
      <div class="kf"><label>Meeting link (optional)</label><input id="ptm_link_${sid}" placeholder="Zoom link if online"></div></div>
    <div class="formmsg" id="ptmMsg_${sid}"></div>
    <button class="kbtn teal" onclick="savePTM('${sid}','${cycleKey}')">Save</button>
    <button class="kbtn ghost" style="margin-left:6px" onclick="drawReviews()">Cancel</button>`;
}
async function savePTM(sid, cycleKey){
  const m=$("ptmMsg_"+sid); const dt=$("ptm_dt_"+sid).value; const link=($("ptm_link_"+sid).value||"").trim();
  if(!dt){ if(m){ m.className="formmsg err"; m.textContent="Pick a date & time."; } return; }
  const rec={ student_id:sid, quarter_label:cycleKey, scheduled_at:new Date(dt).toISOString(), meeting_link:link||null, status:"scheduled", teacher_id: state._ptmTid||null };
  if(m){ m.className="formmsg ok"; m.textContent="Saving…"; }
  const existing=(state._ptmReviews||[]).find(r=>r.student_id===sid && r.quarter_label===cycleKey);
  let error;
  if(existing){ ({ error } = await db.from("progress_reviews").update(rec).eq("id",existing.id)); }
  else { ({ error } = await db.from("progress_reviews").insert(rec)); }
  if(error){ if(m){ m.className="formmsg err"; m.textContent="Couldn't save — "+error.message; } return; }
  renderReviews();
}
function completePtm(rid, sid){
  const A=$("ptmAct_"+sid); if(!A) return;
  A.innerHTML=`<div class="kf"><label>Feedback shared in this Guru Samvaad *</label>
      <textarea id="ptm_notes_${sid}" rows="5" placeholder="Write what was discussed — strengths, what's improved, areas to work on, goals for the coming quarter, and any guidance given. This becomes a permanent part of the student's journey record at Kala Kuteer."></textarea></div>
    <div class="formmsg" id="ptmMsg_${sid}"></div>
    <button class="kbtn teal" onclick="savePtmComplete('${rid}','${sid}')">✓ Save &amp; mark done</button>
    <button class="kbtn ghost" style="margin-left:6px" onclick="drawReviews()">Cancel</button>`;
}
async function savePtmComplete(rid, sid){
  const m=$("ptmMsg_"+sid); const notes=(($("ptm_notes_"+sid)||{}).value||"").trim();
  if(notes.length<10){ if(m){ m.className="formmsg err"; m.textContent="Please write the feedback shared (at least a sentence) before marking this done — it's the record of the student's journey."; } return; }
  if(m){ m.className="formmsg ok"; m.textContent="Saving…"; }
  const { error } = await db.from("progress_reviews").update({ status:"completed", notes }).eq("id",rid);
  if(error){ if(m){ m.className="formmsg err"; m.textContent="Couldn't save — "+error.message; } return; }
  renderReviews();
}
function viewPtmHistory(sid){
  const P=$("ptmHist_"+sid); if(!P) return;
  if(P.dataset.open==="1"){ P.innerHTML=""; P.dataset.open="0"; return; }
  const done=(state._ptmReviews||[]).filter(r=>r.student_id===sid && r.status==="completed")
    .sort((a,b)=>((b.scheduled_at||b.quarter_label)<(a.scheduled_at||a.quarter_label)?-1:1));
  P.dataset.open="1";
  P.innerHTML=done.length?`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">
    ${done.map(r=>`<div style="margin-bottom:12px"><div class="mini"><b>${r.scheduled_at?fmtDateTime(r.scheduled_at):fmtNiceDate(r.quarter_label)}</b></div>
      <div style="white-space:pre-wrap;font-size:13px;margin-top:3px;line-height:1.5">${esc(r.notes||"—")}</div></div>`).join("")}</div>`
    :`<div class="mini" style="margin-top:8px;color:var(--muted)">No completed sessions recorded yet.</div>`;
}
async function cancelPTM(rid){
  if(!confirm("Cancel this scheduled meeting?")) return;
  const { error } = await db.from("progress_reviews").delete().eq("id",rid);
  if(error){ alert("Couldn't cancel — "+error.message); return; }
  renderReviews();
}

const MS_TYPES=[["exam","🎓 Exam","#E6F1FB","#0C447C"],["competition","🏆 Competition","#FAEEDA","#854F0B"],["performance","🎤 Performance","#FBEAF0","#993556"],["achievement","⭐ Achievement","#EAF3DE","#3B6D11"],["workshop","🛠 Workshop","#EEEDFE","#3C3489"],["other","📌 Other","#F1EFE8","#444441"]];
function msMeta(t){ return MS_TYPES.find(x=>x[0]===t)||["other","📌 Other","#F1EFE8","#444441"]; }
async function loadMilestonesInto(cid, studentId, mode){
  state._ms={ cid, studentId, mode }; const C=$(cid); if(!C) return;
  C.innerHTML=`<div class="panel"><h3>${mode==="student"?"My Journey":"Journey &amp; milestones"}</h3><div class="empty">Loading…</div></div>`;
  const { data, error } = await db.from("student_milestones").select("id,type,title,milestone_date,note,source").eq("student_id",studentId).order("milestone_date",{ascending:false,nullsFirst:false}).order("created_at",{ascending:false});
  const list=data||[];
  const rows=list.length?list.map(m=>{ const mt=msMeta(m.type); const canDel=(mode!=="student")||m.source==="student"; const who=m.source==="student"?(mode==="student"?"you":"student"):"school";
    return `<div style="display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start">
      <span class="badge" style="background:${mt[2]};color:${mt[3]};white-space:nowrap">${mt[1]}</span>
      <div style="flex:1"><b>${esc(m.title)}</b><div class="mini" style="color:var(--muted);margin-top:2px">${m.milestone_date?esc(m.milestone_date):""}${m.note?" · "+esc(m.note):""}</div></div>
      <span class="mini" style="white-space:nowrap"><span class="badge ${m.source==="student"?"b-teal":"b-amber"}">${who}</span>${canDel?` <span class="rowbtn danger" onclick="delMilestone('${m.id}')">✕</span>`:""}</span>
    </div>`; }).join(""):`<div class="mini" style="color:var(--muted)">No milestones yet — add the first one below.</div>`;
  const typeOpts=MS_TYPES.map(t=>`<option value="${t[0]}">${t[1]}</option>`).join("");
  C.innerHTML=`<div class="panel"><h3>${mode==="student"?"My Journey":"Journey &amp; milestones"}</h3>
    ${error?`<div class="cfgwarn">${esc(error.message)}</div>`:rows}
    <div style="background:#FBF1DA;border:1px solid var(--saffron);border-radius:10px;padding:13px;margin-top:14px">
      <h3 style="font-size:13px;margin:0 0 8px">➕ Add a milestone</h3>
      <div class="form2">
        <div class="kf"><label>Type</label><select id="ms_type">${typeOpts}</select></div>
        <div class="kf"><label>Date</label><input id="ms_date" type="date"></div>
      </div>
      <div class="kf"><label>Title</label><input id="ms_title" placeholder="e.g. Grade 2 Tabla exam"></div>
      <div class="kf"><label>Note (optional)</label><input id="ms_note" placeholder="e.g. Result: Distinction"></div>
      <div class="formmsg" id="ms_msg"></div>
      <button class="kbtn teal" onclick="addMilestone()">Add to journey</button>
    </div></div>`;
}
async function addMilestone(){
  const ctx=state._ms||{}; const m=$("ms_msg"); const title=((($("ms_title")||{}).value)||"").trim();
  if(!title){ if(m){ m.className="formmsg err"; m.textContent="Please enter a title."; } return; }
  const rec={ student_id:ctx.studentId, type:$("ms_type").value, title, milestone_date:$("ms_date").value||null, note:((($("ms_note")||{}).value)||"").trim()||null, source:ctx.mode==="student"?"student":"school" };

async function loadStudentCalendar(){
  const [y,mo]=state._scalMonth.split("-").map(Number);
  const start=`${y}-${PAD(mo)}-01`, end=new Date(y,mo,0).toISOString().slice(0,10);
  const { data:ev } = await db.from("events").select("id,title,event_date,end_date").lte("event_date",end).or(`end_date.gte.${start},and(end_date.is.null,event_date.gte.${start})`).order("event_date");
  const { data:sess } = await db.from("class_sessions").select("id,title,teacher_id,session_date,start_time,mode,zoom_link").gte("session_date",start).lte("session_date",end).order("session_date");
  state._scalEvents=ev||[]; state._scalSess=sess||[]; drawStudentCalendar();
}
function drawStudentCalendar(){
  const [y,mo]=state._scalMonth.split("-").map(Number);
  if($("scalLabel")) $("scalLabel").textContent=MONS[mo-1]+" "+y;
  const mStart=new Date(y,mo-1,1), mEnd=new Date(y,mo,0), dim=mEnd.getDate(), first=mStart.getDay();
  const todayS=new Date().toISOString().slice(0,10);
  const byDay={}; (state._scalEvents||[]).forEach(e=>{ const s=parseD(String(e.event_date).slice(0,10)); const en=e.end_date?parseD(String(e.end_date).slice(0,10)):s; let d=new Date(Math.max(s,mStart)); const last=new Date(Math.min(en,mEnd)); for(;d<=last;d.setDate(d.getDate()+1)){ const day=d.getDate(); (byDay[day]=byDay[day]||[]).push(e); } });
  const sessByDay={}; (state._scalSess||[]).forEach(c=>{ const day=Number(String(c.session_date).slice(8,10)); (sessByDay[day]=sessByDay[day]||[]).push(c); });
  const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="calhd">${d}</div>`).join("");
  let cells="";
  for(let i=0;i<first;i++) cells+=`<div class="calcell blank"></div>`;
  for(let d=1;d<=dim;d++){ const ds=`${y}-${PAD(mo)}-${PAD(d)}`;
    const clsChips=(sessByDay[d]||[]).sort((a,b)=>String(a.start_time||"").localeCompare(String(b.start_time||""))).map(c=>`<div class="calev" style="background:var(--saffron);color:#3a2c00;border-color:var(--saffron)" title="${esc(c.title)} · ${esc(teacherName(c.teacher_id))}${c.start_time?' · '+fmtTime(c.start_time.slice(0,5)):''}">${c.start_time?fmtTime(c.start_time.slice(0,5))+' · ':''}${esc(c.title)}</div>`).join("");
    const evs=(byDay[d]||[]).map(e=>`<div class="calev" title="${esc(e.title)}">${esc(e.title)}</div>`).join("");
    cells+=`<div class="calcell${ds===todayS?" today":""}"><div class="caldate">${d}</div>${clsChips}${evs}</div>`;
  }

// per-country digit length [min,max]; default 7–15
const PHONE_RULES = { "+91":[10,10], "+1":[10,10], "+44":[10,11], "+7":[10,10], "+56":[8,9], "+65":[8,8], "+66":[9,9], "+971":[9,9] };
const CC_OPTS = [["+91","🇮🇳 India +91"],["+1","🇺🇸 USA/Canada +1"],["+44","🇬🇧 UK +44"],["+7","🇷🇺 Russia +7"],["+56","🇨🇱 Chile +56"],["+65","🇸🇬 Singapore +65"],["+66","🇹🇭 Thailand +66"],["+971","🇦🇪 UAE +971"]];
function phoneOK(code,d){ const r=PHONE_RULES[code]||[7,15]; return d.length>=r[0]&&d.length<=r[1]; }
function phoneHint(code){ const r=PHONE_RULES[code]; return r?(r[0]===r[1]?r[0]+" digits":r[0]+"–"+r[1]+" digits"):"7–15 digits"; }
const DRAFT_KEY="kk_intake_draft_v2";
function saveDraft(){ const f=$("intakeForm"); if(!f) return; const o={}; f.querySelectorAll("input,select,textarea").forEach(el=>{ if(!el.id) return; o[el.id]=el.type==="checkbox"?el.checked:el.value; }); try{ localStorage.setItem(DRAFT_KEY,JSON.stringify(o)); }catch(e){} }
function restoreDraft(){ let o; try{ o=JSON.parse(localStorage.getItem(DRAFT_KEY)||"null"); }catch(e){} if(!o) return false; let any=false; Object.keys(o).forEach(id=>{ const el=$(id); if(!el) return; if(el.type==="checkbox") el.checked=o[id]; else el.value=o[id]; if(o[id]!==""&&o[id]!==false) any=true; }); return any; }
function clearDraft(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} }
